<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH v7.0</title>
    <style>
        :root { --gold: #f6851b; --blue: #007aff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; }

        /* ЗАСТАВКА */
        #splash { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeOut 0.5s forwards 2s; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* ЭКРАНЫ */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; padding: 20px; background: #000; }
        .active { display: flex; }

        /* ГЛОБУС И МЕНЮ */
        .top-bar { width: 100%; display: flex; justify-content: flex-end; padding: 10px; }
        #l-menu { display: none; background: #222; position: absolute; top: 50px; right: 20px; border-radius: 10px; z-index: 100; }
        .l-item { padding: 15px 25px; border-bottom: 1px solid #333; cursor: pointer; }

        /* ФОРМЫ */
        input { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; }
        .btn { width: 100%; max-width: 300px; padding: 18px; border-radius: 10px; border: none; background: var(--gold); color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link { margin-top: 20px; color: #666; text-decoration: underline; font-size: 14px; }

        /* КАМЕРА */
        video { width: 250px; height: 250px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; background: #111; }

        /* APP */
        #app { display: none; height: 100vh; flex-direction: column; background: #f0f0f0; color: #000; position: absolute; inset: 0; z-index: 5000; }
        header { background: #1a1a1a; color: #fff; padding: 15px; text-align: center; font-weight: bold; letter-spacing: 2px; }
        .main { flex: 1; overflow-y: auto; }
        .c-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #ddd; background: #fff; }
        .c-av { width: 50px; height: 50px; background: #eee; border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        footer { display: flex; justify-content: space-around; padding: 15px 0 30px; background: #f8f8f8; border-top: 1px solid #ddd; }
        .n-btn { color: #999; font-size: 12px; font-weight: bold; }
        .n-btn.on { color: #07c160; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="font-size: 40px; letter-spacing: 10px;">BSMLH</h1>
        <p style="font-size: 8px; margin-top: 10px;">BIOMETRIC SECURITY MULTIFUNCTION LEDGER FOR HUMANITY</p>
    </div>

    <div id="scr-reg" class="screen active">
        <div class="top-bar"><span onclick="toggleL()" style="font-size: 30px; color: var(--blue);">🌐</span></div>
        <div id="l-menu">
            <div class="l-item" onclick="setL('RU')">RU</div>
            <div class="l-item" onclick="setL('EN')">EN</div>
            <div class="l-item" onclick="setL('AR')">AR</div>
            <div class="l-item" onclick="setL('CH')">CH</div>
        </div>
        <h2 id="t-reg" style="margin: 40px 0 20px;">РЕГИСТРАЦИЯ</h2>
        <input type="text" id="name" placeholder="ИМЯ">
        <button id="b-next" class="btn" onclick="goScan()">ДАЛЕЕ</button>
    </div>

    <div id="scr-scan" class="screen">
        <video id="v" autoplay playsinline></video>
        <button id="b-cam" class="btn" style="margin-top: 20px;" onclick="takeP()">СДЕЛАТЬ ФОТО</button>
    </div>

    <div id="scr-chip" class="screen">
        <h3 id="t-chip" style="margin-top: 40px;">ОЖИДАНИЕ ЧИПА...</h3>
        <div style="font-size: 100px; margin: 40px;">💍</div>
        <button id="b-conf" class="btn" onclick="goApp()">ПОДТВЕРДИТЬ</button>
        <div class="link" onclick="goApp()">ВХОД БЕЗ ЧИПА</div>
    </div>

    <div id="app">
        <header>BSMLH</header>
        <div class="main" id="m-cont">
            <div id="v-chat"></div>
            <div id="v-prof" style="display:none; padding: 20px;">
                <div style="display:flex; align-items:center; background:#fff; padding:20px; border-radius:10px;">
                    <img id="p-img" style="width:70px; height:70px; border-radius:10px; background:#eee; object-fit:cover;">
                    <div style="margin-left:15px;"><h2 id="p-name">User</h2><p style="color:#888;">ID: 77801</p></div>
                </div>
            </div>
        </div>
        <footer>
            <div class="n-btn on" id="n-chat" onclick="tab('chat')">CHAT</div>
            <div class="n-btn" id="n-prof" onclick="tab('prof')">PROFILE</div>
        </footer>
    </div>

    <script>
        const txt = {
            'RU': {r:"РЕГИСТРАЦИЯ", n:"ДАЛЕЕ", c:"ОЖИДАНИЕ ЧИПА...", f:"ПОДТВЕРДИТЬ"},
            'EN': {r:"REGISTRATION", n:"NEXT", c:"WAITING FOR CHIP...", f:"CONFIRM"},
            'AR': {r:"تسجيل", n:"التالي", c:"انتظار...", f:"تأكيد"},
            'CH': {r:"注册", n:"下一步", c:"等待...", f:"确认"}
        };

        function toggleL() { 
            const m = document.getElementById('l-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function setL(l) {
            document.getElementById('t-reg').innerText = txt[l].r;
            document.getElementById('b-next').innerText = txt[l].n;
            document.getElementById('t-chip').innerText = txt[l].c;
            document.getElementById('b-conf').innerText = txt[l].f;
            toggleL();
        }

        async function goScan() {
            if(!document.getElementById('name').value) return;
            document.getElementById('scr-reg').classList.remove('active');
            document.getElementById('scr-scan').classList.add('active');
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
            document.getElementById('v').srcObject = s;
        }

        function takeP() {
            const v = document.getElementById('v');
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            document.getElementById('p-img').src = c.toDataURL();
            v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('scr-scan').classList.remove('active');
            document.getElementById('scr-chip').classList.add('active');
        }

        function goApp() {
            document.getElementById('p-name').innerText = document.getElementById('name').value;
            document.getElementById('scr-chip').classList.remove('active');
            document.getElementById('app').style.display = 'flex';
            const chat = document.getElementById('v-chat');
            chat.innerHTML = "";
            ["Alex", "Sarah", "Ivan", "Ahmed", "Li", "Maria", "John", "Elena", "Chen", "Fatima"].forEach(n => {
                chat.innerHTML += <div class="c-item"><div class="c-av">👤</div><div><h4>${n}</h4><p style="font-size:12px;color:#999;">Secure message...</p></div></div>;
            });
        }

        function tab(t) {
            document.getElementById('v-chat').style.display = t === 'chat' ? 'block' : 'none';
            document.getElementById('v-prof').style.display = t === 'prof' ? 'block' : 'none';
            document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('on'));
            document.getElementById('n-'+t).classList.add('on');
        }
    </script>
</body>
</html>
