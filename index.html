<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | Registration & Console</title>
    <style>
        :root { --bg: #000; --text: #fff; --gold: #f6851b; --dim: #111; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- ЭКРАНЫ РЕГИСТРАЦИИ --- */
        .step-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 30px; text-align: center; }
        .active-step { display: flex; }
        
        .logo-s { font-size: 24px; letter-spacing: 8px; margin-bottom: 40px; color: var(--gold); }
        .input-field { width: 100%; max-width: 320px; background: var(--dim); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 10px; outline: none; }
        .btn-main { width: 100%; max-width: 320px; background: #fff; color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Камера */
        .camera-wrap { width: 220px; height: 220px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; margin-bottom: 20px; background: #050505; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* --- КОНСОЛЬ (СКРЫТА ДО КОНЦА) --- */
        #fortress-console { display: none; height: 100vh; flex-direction: column; }
        header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }
        main { flex: 1; padding: 20px; overflow-y: auto; }
        footer { height: 80px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); background: #050505; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; color: #555; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="step-1" class="step-screen active-step">
        <div class="logo-s">BSMLH</div>
        <h2 style="margin-bottom: 20px;">Регистрация</h2>
        <input type="text" id="reg-name" class="input-field" placeholder="Имя">
        <input type="text" id="reg-surname" class="input-field" placeholder="Фамилия">
        <input type="tel" id="reg-phone" class="input-field" placeholder="Телефон">
        <input type="email" id="reg-email" class="input-field" placeholder="E-mail">
        <button class="btn-main" onclick="nextStep(2)">ДАЛЕЕ</button>
    </div>

    <div id="step-2" class="step-screen">
        <div class="logo-s">БИОМЕТРИЯ</div>
        <div class="camera-wrap"><video id="video" autoplay playsinline></video></div>
        <p style="font-size: 14px; color: #888; margin-bottom: 20px;">Сделайте фото для создания HUID</p>
        <button class="btn-main" onclick="takePhoto()">СДЕЛАТЬ ФОТО</button>
    </div>

    <div id="step-3" class="step-screen">
        <div class="logo-s">КЛЮЧ ДОСТУПА</div>
        <div id="nfc-area">
            <div style="font-size: 50px; margin-bottom: 20px;">💍</div>
            <h3>Приложите кольцо</h3>
            <p style="color: #666; margin-top: 10px; font-size: 14px;">Связываем физический чип с вашей личностью</p>
        </div>
        <button class="btn-main" style="background: transparent; color: #888; border: 1px solid #333; margin-top: 40px;" onclick="finishAll('virtual')">У МЕНЯ НЕТ КОЛЬЦА (vHUID)</button>
    </div>

    <div id="fortress-console">
        <header>
            <div style="color: var(--gold)">☰</div>
            <div style="font-size: 12px; letter-spacing: 2px;">SECURITY & ACCESS</div>
            <div>🌐</div>
        </header>
        <main>
            <h3 id="welcome-msg" style="color: var(--gold)">WALL STATUS</h3>
            <div style="margin-top:20px; background: var(--dim); padding: 20px; border-radius: 15px; border: 1px solid var(--border);">
                <p style="color: #888;">HUID: <span id="res-huid" style="color: var(--gold)"></span></p>
                <p style="margin-top:10px;">Статус: <span id="res-status" style="color: var(--gold)"></span></p>
            </div>
        </main>
        <footer>
            <div class="nav-item active"><i>🛡️</i>WALL</div>
            <div class="nav-item"><i>🛠️</i>WORKSHOP</div>
            <div class="nav-item"><i>🚀</i>HUB</div>
            <div class="nav-item"><i>🔒</i>VAULT</div>
        </footer>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        let userData = {};
        let stream = null;

        function nextStep(step) {
            document.querySelectorAll('.step-screen').forEach(s => s.classList.remove('active-step'));
            document.getElementById('step-' + step).classList.add('active-step');
            if(step === 2) startCamera();
        }

        async function startCamera() {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
        }

        function takePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            userData.photo = canvas.toDataURL('image/jpeg');
            if(stream) stream.getTracks().forEach(t => t.stop());
            nextStep(3);
            
            // Запуск сканера NFC если поддерживается
            if ('NDEFReader' in window) {
                const ndef = new NDEFReader();
                ndef.scan().then(() => {
                    ndef.onreading = event => finishAll(event.serialNumber);
                }).catch(() => {});
            }
        }

        function finishAll(nfcUid) {
            const isVirtual = nfcUid === 'virtual';
            const huid = isVirtual ? "vHUID-" + Math.random().toString(36).substr(2, 6).toUpperCase() : "HUID-" + nfcUid.substr(0, 8).toUpperCase();
            
            localStorage.setItem('bs_active', 'true');
            localStorage.setItem('bs_huid', huid);
            localStorage.setItem('bs_status', isVirtual ? 'Странник (Виртуальный)' : 'Хранитель (Кольцо)');

            document.getElementById('res-huid').innerText = huid;
            document.getElementById('res-status').innerText = localStorage.getItem('bs_status');
            
            document.querySelectorAll('.step-screen').forEach(s => s.style.display = 'none');
            document.getElementById('fortress-console').style.display = 'flex';
        }

        window.onload = () => {
            if(localStorage.getItem('bs_active')) {
                finishAll(localStorage.getItem('bs_huid').includes('vHUID') ? 'virtual' : 'existing');
            }
        }
    </script>
</body>
</html>
