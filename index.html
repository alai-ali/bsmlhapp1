<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH v6.5 | Advanced Tech</title>
    <style>
        :root { --gold: #f6851b; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* ЗАСТАВКА */
        #splash { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeOut 0.5s forwards 3s; pointer-events: none; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        .s-title { font-size: 50px; font-weight: 900; letter-spacing: 12px; color: #fff; }
        .s-sub { font-size: 10px; color: #fff; margin-top: 15px; text-align: center; max-width: 80%; text-transform: uppercase; }

        /* ЭКРАНЫ */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; padding: 25px; background: #000; z-index: 1000; }
        .active { display: flex; }

        /* КАМЕРА */
        #video-feed { width: 240px; height: 300px; background: #111; border: 2px solid var(--gold); border-radius: 20px; object-fit: cover; transform: scaleX(-1); }
        .cam-box { position: relative; margin-bottom: 20px; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--gold); top: 0; animation: scan 2s infinite; z-index: 2; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* КНОПКИ */
        .f-box { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }
        input { background: #111; border: 1px solid #333; padding: 16px; color: #fff; border-radius: 12px; font-size: 16px; outline: none; }
        .btn-m { background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-link { color: #555; font-size: 11px; margin-top: 20px; text-decoration: underline; cursor: pointer; }

        #app { display: none; height: 100vh; flex-direction: column; background: #000; z-index: 5000; position: absolute; inset: 0; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="s-title">BSMLH</div>
        <div class="s-sub">BIOMETRIC SECURITY MULTIFUNCTION LEDGER FOR HUMANITY</div>
    </div>

    <div id="scr-reg" class="screen active">
        <h2 style="margin-top: 40px; margin-bottom: 20px;">РЕГИСТРАЦИЯ</h2>
        <div class="f-box">
            <input type="text" id="in-f" placeholder="ИМЯ">
            <button class="btn-m" onclick="startCam()">ДАЛЕЕ</button>
        </div>
    </div>

    <div id="scr-scan" class="screen">
        <div class="cam-box">
            <video id="video-feed" autoplay playsinline></video>
            <div class="scan-line"></div>
        </div>
        <div class="f-box">
            <button class="btn-m" onclick="takePhoto()">СДЕЛАТЬ ФОТО</button>
        </div>
    </div>

    <div id="scr-chip" class="screen">
        <div style="font-size: 60px; margin-bottom: 20px;">🛡️</div>
        <h3 id="nfc-status">ОЖИДАНИЕ ЧИПА...</h3>
        <p style="font-size: 12px; color: #666; text-align: center; margin: 15px 0;">ПРИЛОЖИТЕ NFC ЧИП К ЗАДНЕЙ ПАНЕЛИ</p>
        <div class="f-box">
            <button class="btn-m" onclick="startNFC()">АКТИВИРОВАТЬ СКАНЕР</button>
            <div class="btn-link" onclick="toApp()">ВОЙТИ БЕЗ ЧИПА</div>
        </div>
    </div>

    <div id="app">
        <header style="height:70px; border-bottom:1px solid #222; display:flex; justify-content:center; align-items:center;">
            <div style="font-weight:900; letter-spacing:4px;">BSMLH</div>
        </header>
        <div style="padding:20px;">
            <div style="background:#111; padding:15px; border-radius:12px; border-left:4px solid var(--gold);">
                ДОСТУП РАЗРЕШЕН.
            </div>
        </div>
    </div>

    <script>
        // 1. Работа с камерой
        async function startCam() {
            if(!document.getElementById('in-f').value) return;
            document.getElementById('scr-reg').classList.remove('active');
            document.getElementById('scr-scan').classList.add('active');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('video-feed').srcObject = stream;
            } catch (err) {
                alert("Камера недоступна");
                toChipScreen();
            }
        }

        function takePhoto() {
            const video = document.getElementById('video-feed');
            video.pause(); // Эффект снимка
            setTimeout(() => {
                const stream = video.srcObject;
                stream.getTracks().forEach(track => track.stop()); // Выключаем камеру
                toChipScreen();
            }, 1000);
        }

        function toChipScreen() {
            document.getElementById('scr-scan').classList.remove('active');
            document.getElementById('scr-chip').classList.add('active');
        }

        // 2. Реальный NFC (работает в Chrome на Android)
        async function startNFC() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    document.getElementById('nfc-status').innerText = "ПОИСК ЧИПА...";
                    
                    ndef.onreading = event => {
                        document.getElementById('nfc-status').innerText = "ЧИП ПОДТВЕРЖДЕН!";
                        document.getElementById('nfc-status').style.color = "#f6851b";
                        setTimeout(toApp, 1000);
                    };
                } catch (error) {
                    alert("Ошибка NFC: " + error);
                }
            } else {
                alert("Ваш браузер не поддерживает NFC. Используйте вход без чипа.");
            }
        }

        function toApp() {
            document.getElementById('scr-chip').classList.remove('active');
            document.getElementById('app').style.display = 'flex';
        }
    </script>
</body>
</html>
