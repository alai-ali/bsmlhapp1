<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH v6.6 | Maps Integrated</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #f6851b; --bg: #000; --panel: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; }

        /* ЭКРАНЫ (Упростим переход для теста) */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #000; z-index: 1000; }
        .active { display: flex; }

        /* APP STRUCTURE */
        #app { display: none; height: 100vh; flex-direction: column; z-index: 2000; }
        header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid #222; background: #050505; }
        .main-content { flex: 1; position: relative; overflow: hidden; }
        
        /* КАРТА */
        #map { width: 100%; height: 100%; background: #050505; display: none; }
        .map-overlay { position: absolute; bottom: 20px; left: 20px; z-index: 1000; }
        .map-btn { background: var(--gold); border: none; padding: 12px; border-radius: 8px; font-weight: bold; color: #000; cursor: pointer; font-size: 12px; }

        /* ЧАТ / ПРОФИЛЬ */
        .view { width: 100%; height: 100%; padding: 20px; overflow-y: auto; display: none; }
        .active-view { display: block; }

        /* ФУТЕР */
        footer { height: 90px; padding-bottom: 30px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; background: #050505; }
        .n-btn { color: #444; font-size: 10px; font-weight: bold; text-transform: uppercase; text-align: center; }
        .n-btn.on { color: var(--gold); }

        /* РЕГИСТРАЦИЯ (для быстрого входа в тест) */
        .btn-m { background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: bold; width: 100%; max-width: 300px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="scr-reg" class="screen active" style="justify-content: center; align-items: center;">
        <h2 style="margin-bottom: 20px; letter-spacing: 5px;">BSMLH LOGIN</h2>
        <input type="text" id="user-name" placeholder="ВВЕДИТЕ ИМЯ" style="background:#111; border:1px solid #333; color:#fff; padding:15px; border-radius:10px; margin-bottom:15px; width:280px;">
        <button class="btn-m" onclick="login()">ИНИЦИАЛИЗАЦИЯ</button>
    </div>

    <div id="app">
        <header>
            <div style="font-size:20px; color:var(--gold);">☰</div>
            <div style="font-weight:900; letter-spacing:3px; font-size:14px;">BSMLH vHUID</div>
            <div id="top-user" style="font-size:10px; color:#666;">USER</div>
        </header>

        <div class="main-content">
            <div id="map"></div>
            <div class="map-overlay" id="map-ui" style="display:none;">
                <button class="map-btn" onclick="getMyLoc()">МОЯ ПОЗИЦИЯ</button>
            </div>

            <div id="view-chat" class="view active-view">
                <div style="background:#111; padding:15px; border-radius:12px; border-left:4px solid var(--gold);">
                    СИСТЕМА: ОЖИДАНИЕ КОМАНДЫ...
                </div>
            </div>

            <div id="view-prof" class="view">
                <div style="text-align:center; padding-top:40px;">
                    <div style="font-size:60px; margin-bottom:10px;">👤</div>
                    <h2 id="prof-name">USER NAME</h2>
                    <p style="color:var(--gold); font-size:12px; margin-top:5px;">ID: 778-BSMLH-01</p>
                </div>
            </div>
        </div>

        <footer>
            <div id="n-chat" class="n-btn on" onclick="showTab('chat')">CHAT</div>
            <div id="n-maps" class="n-btn" onclick="showTab('maps')">MAPS</div>
            <div class="n-btn">HUB</div>
            <div id="n-prof" class="n-btn" onclick="showTab('prof')">PROFILE</div>
        </footer>
    </div>

    <script>
        let map;
        let userMarker;

        function login() {
            const name = document.getElementById('user-name').value;
            if(!name) return;
            document.getElementById('top-user').innerText = name.toUpperCase();
            document.getElementById('prof-name').innerText = name;
            document.getElementById('scr-reg').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            initMap(); // Инициализируем карту заранее, но она скрыта
        }

        function initMap() {
            // Создаем карту, центрируем на мир. Темная тема через CartoDB.
            map = L.map('map', { zoomControl: false }).setView([50, 20], 3);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: 'BSMLH SECURITY'
            }).addTo(map);
        }

        function showTab(tab) {
            // Скрываем всё
            document.getElementById('view-chat').style.display = 'none';
            document.getElementById('view-prof').style.display = 'none';
            document.getElementById('map').style.display = 'none';
            document.getElementById('map-ui').style.display = 'none';
            
            // Снимаем подсветку с кнопок
            document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('on'));

            if(tab === 'chat') {
                document.getElementById('view-chat').style.display = 'block';
                document.getElementById('n-chat').classList.add('on');
            } 
            else if(tab === 'maps') {
                document.getElementById('map').style.display = 'block';
                document.getElementById('map-ui').style.display = 'block';
                document.getElementById('n-maps').classList.add('on');
                // Обновляем размер карты (важно для Leaflet при смене дисплея)
                setTimeout(() => map.invalidateSize(), 100);
            }
            else if(tab === 'prof') {
                document.getElementById('view-prof').style.display = 'block';
                document.getElementById('n-prof').classList.add('on');
            }
        }

        function getMyLoc() {
            if (!navigator.geolocation) return alert("GPS не поддерживается");
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                map.setView([latitude, longitude], 13);
                
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.circle([latitude, longitude], {
                    color: '#f6851b',
                    fillColor: '#f6851b',
                    fillOpacity: 0.5,
                    radius: 500
                }).addTo(map).bindPopup('ВАША ПОЗИЦИЯ: АКТИВНА').openPopup();
            });
        }
    </script>
</body>
</html>
