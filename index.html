<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | The Fortress Console</title>
    <style>
        :root { --bg: #000; --text: #fff; --gold: #f6851b; --dim: #0d0d0d; --border: #222; --danger: #ff3b30; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* ЭКРАНЫ */
        .screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 30px; }
        .active-screen { display: flex; }
        .logo { font-size: 32px; letter-spacing: 10px; margin: 40px 0; color: var(--gold); }
        input { width: 100%; max-width: 320px; background: #111; border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: #fff; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; max-width: 320px; background: #fff; color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* КОНСОЛЬ */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); }
        .header-title { text-align: center; flex: 1; }
        .abbr { color: var(--gold); font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        .full-name { font-size: 6px; color: #555; text-transform: uppercase; display: block; }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; padding: 20px; flex-direction: column; }
        .close-x { align-self: flex-end; font-size: 30px; color: var(--gold); padding: 10px; }

        main { flex: 1; overflow-y: auto; padding: 20px; }
        .tab-p { display: none; }
        .active-tab { display: block; }

        /* FOOTER */
        footer { height: 85px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); background: #050505; padding-bottom: 10px; }
        .n-link { color: #444; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .n-link.active { color: var(--gold); }

        /* SIDE MENU */
        #side-menu { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--dim); z-index: 4000; transition: 0.3s; padding: 20px; border-right: 1px solid var(--border); }
        #side-menu.open { left: 0; }
    </style>
</head>
<body>

    <div id="scr-reg" class="screen active-screen">
        <div class="logo">BSMLH</div>
        <input type="text" id="reg-name" placeholder="Имя">
        <input type="text" id="reg-surname" placeholder="Фамилия">
        <button class="btn" onclick="next(2)">ДАЛЕЕ</button>
    </div>

    <div id="scr-nfc" class="screen">
        <div class="logo">LINK KEY</div>
        <div style="font-size:80px; margin-bottom:20px;">💍</div>
        <p style="text-align:center; color:#888;">Приложите кольцо для связки с HUID</p>
        <button class="btn" style="background:transparent; color:#555; border:1px solid #333; margin-top:40px;" onclick="enterApp('vHUID-TEMP')">НЕТ КОЛЬЦА (VIRTUAL)</button>
    </div>

    <div id="main-app">
        <div id="side-menu">
            <div style="color:var(--gold); border:1px solid var(--gold); padding:10px; border-radius:8px; text-align:center;">+ NEW AI CHAT</div>
            <p style="margin-top:20px; color:#444; font-size:12px;">HISTORY</p>
        </div>

        <header>
            <div onclick="toggleSide()" style="color:var(--gold); font-size:24px;">☰</div>
            <div class="header-title">
                <span class="abbr" id="txt-abbr">BSMLH</span>
                <span class="full-name" id="txt-full">Biometric Security Multi-Function Ledger for Humanity</span>
            </div>
            <div style="display:flex; gap:15px; font-size:22px;">
                <span onclick="openModal('lang')">🌐</span>
                <span onclick="openModal('qr')">🔳</span>
            </div>
        </header>

        <main>
            <div id="t-chat" class="tab-p active-tab">
                <p style="color:#333;">Ваши контакты будут здесь...</p>
            </div>
            <div id="t-maps" class="tab-p">
                <div style="text-align:center; background:#111; padding:30px; border-radius:20px; border:1px solid var(--blue);">
                    <span style="font-size:60px; color:#00aaff;">🌍</span>
                    <h2 style="color:#00aaff;">MAP OF KINDNESS</h2>
                </div>
            </div>
            <div id="t-hub" class="tab-p">
                <h3>PROJECT HUB</h3>
            </div>
            <div id="t-profile" class="tab-p">
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px;">
                    <div style="width:60px; height:60px; background:#222; border-radius:10px; border:1px solid var(--gold);"></div>
                    <div>
                        <h2 id="p-name">User</h2>
                        <small id="p-huid" style="color:#444;"></small>
                    </div>
                </div>
                <button class="btn" style="background:var(--danger); color:white; width:100%;" onclick="logout()">ВЫЙТИ ИЗ КРЕПОСТИ</button>
            </div>
        </main>

        <footer>
            <div class="n-link active" onclick="tab('chat', this)"><i>💬</i>CHAT</div>
            <div class="n-link" onclick="tab('maps', this)"><i>🗺️</i>MAPS</div>
            <div class="n-link" onclick="tab('hub', this)"><i>🚀</i>HUB</div>
            <div class="n-link" onclick="tab('profile', this)"><i>👤</i>PROFILE</div>
        </footer>
    </div>

    <div id="modal" class="modal">
        <span class="close-x" onclick="closeModal()">×</span>
        <div id="modal-body" style="display:flex; flex-direction:column; align-items:center; gap:20px; margin-top:40px;"></div>
    </div>

    <script>
        function next(s) {
            document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active-screen'));
            if(s===2) document.getElementById('scr-nfc').classList.add('active-screen');
        }

        function enterApp(huid) {
            localStorage.setItem('session', 'active');
            localStorage.setItem('u-name', document.getElementById('reg-name').value);
            localStorage.setItem('u-huid', huid);
            location.reload(); 
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function toggleSide() { document.getElementById('side-menu').classList.toggle('open'); }

        function tab(t, el) {
            document.querySelectorAll('.tab-p').forEach(p=>p.classList.remove('active-tab'));
            document.querySelectorAll('.n-link').forEach(l=>l.classList.remove('active'));
            document.getElementById('t-'+t).classList.add('active-tab');
            el.classList.add('active');
        }

        function openModal(type) {
            const m = document.getElementById('modal');
            const b = document.getElementById('modal-body');
            m.style.display = 'flex';
            if(type==='lang') {
                b.innerHTML = `<h3>Выберите язык</h3>
                               <button class="btn" onclick="setLang('ru')">Русский</button>
                               <button class="btn" onclick="setLang('en')">English</button>`;
            } else {
                b.innerHTML = `<h3>SCAN & SHARE</h3>
                               <div style="width:200px; height:200px; border:2px dashed #444; display:flex; align-items:center; justify-content:center;">Камера...</div>
                               <p>Ваш QR-код:</p>
                               <div style="width:120px; height:120px; background:white; padding:10px;">🔳</div>`;
            }
        }

        function closeModal() { document.getElementById('modal').style.display='none'; }

        function setLang(l) {
            if(l==='en') {
                document.getElementById('txt-abbr').innerText = "BSMLH";
                document.querySelectorAll('.n-link')[0].innerHTML = "<i>💬</i>CHAT";
            }
            closeModal();
        }

        window.onload = () => {
            if(localStorage.getItem('session')) {
                document.getElementById('scr-reg').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('p-name').innerText = localStorage.getItem('u-name');
                document.getElementById('p-huid').innerText = localStorage.getItem('u-huid');
            }
        };
    </script>
</body>
</html>
