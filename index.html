<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | Terminal</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --text: #fff; --panel: #111; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* МИНИМАЛИСТИЧНАЯ ЗАСТАВКА */
        #splash {
            position: fixed; inset: 0; z-index: 99999;
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        .logo-txt { font-size: 45px; font-weight: bold; letter-spacing: 15px; color: var(--text); }

        /* ЭКРАНЫ */
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 40px 20px; }
        .active-screen { display: flex; }

        .lang-switch { position: absolute; top: 30px; right: 20px; color: var(--gold); border: 1px solid var(--gold); padding: 5px 10px; cursor: pointer; }

        .f-group { width: 100%; max-width: 320px; margin-top: 50px; display: flex; flex-direction: column; gap: 10px; }
        input { background: var(--panel); border: 1px solid var(--border); padding: 15px; color: #fff; outline: none; }
        .btn-ui { background: var(--gold); color: #000; border: none; padding: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* КОНСОЛЬ */
        #console { display: none; height: 100vh; flex-direction: column; }
        header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }

        /* КАРТА (ТЕКСТОВАЯ) */
        .map-static {
            width: 100%; height: 250px; border: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #050505; color: var(--gold); font-size: 12px; line-height: 2;
        }

        /* ЧАТ */
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border: 1px solid var(--border); max-width: 90%; font-size: 13px; }
        .msg.ai { align-self: flex-start; border-left: 3px solid var(--gold); }
        .msg.user { align-self: flex-end; background: #222; }

        /* ФУТЕР (ТЕКСТОВЫЙ) */
        footer { height: 80px; padding-bottom: 20px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); background: #000; }
        .nav-btn { color: #444; font-size: 12px; cursor: pointer; font-weight: bold; }
        .nav-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .entry-bar { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        .entry-bar input { flex: 1; padding: 10px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-txt">BSMLH</div>
    </div>

    <div id="scr-auth" class="screen active-screen">
        <div class="lang-switch" onclick="chLang()">LANG: <span id="l-cur">EN</span></div>
        <h2 id="l-welcome" style="margin-top:40px;">[ ACCESS_REQUIRED ]</h2>
        <div class="f-group">
            <input type="text" id="fn" placeholder="FIRST NAME">
            <input type="text" id="ln" placeholder="LAST NAME">
            <input type="tel" id="ph" placeholder="PHONE">
            <button class="btn-ui" id="l-btn" onclick="openSys()">INITIALIZE</button>
        </div>
    </div>

    <div id="console">
        <header>
            <div style="color:var(--gold)">=</div>
            <div style="letter-spacing:5px; font-weight:bold;">BSMLH</div>
            <div onclick="location.reload()">X</div>
        </header>

        <main style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
            <div id="v-chat" class="chat-box">
                <div class="msg ai" id="l-greet">SYSTEM: AI_MODULE_ONLINE. READY.</div>
            </div>
            <div class="entry-bar" id="c-input">
                <input type="text" id="m-val" placeholder="TYPE...">
                <button onclick="send()" style="background:var(--gold); border:none; padding:0 15px; font-weight:bold;">SEND</button>
            </div>

            <div id="v-maps" style="display:none; padding:20px;">
                <div class="map-static">
                    <div>[ SECTOR_01: ACTIVE ]</div>
                    <div>[ COORDINATES: 55.75 | 37.61 ]</div>
                    <div style="color:#222">----------------------</div>
                    <div>STATUS: ENCRYPTED</div>
                </div>
                <h3 id="l-map-h" style="margin-top:20px; font-weight:normal;">> DIGITAL_LEDGER_MAP</h3>
            </div>
        </main>

        <footer>
            <div class="nav-btn active" onclick="nav('chat', this)">CHAT</div>
            <div class="nav-btn" onclick="nav('maps', this)">MAPS</div>
            <div class="nav-btn">HUB</div>
            <div class="nav-btn" onclick="location.reload()">EXIT</div>
        </footer>
    </div>

    <script>
        let lang = 'EN';
        const ui = {
            'EN': { welcome: "[ ACCESS_REQUIRED ]", btn: "INITIALIZE", greet: "SYSTEM: AI_MODULE_ONLINE. READY.", maph: "> DIGITAL_LEDGER_MAP", p1: "FIRST NAME", p2: "LAST NAME", p3: "PHONE" },
            'RU': { welcome: "[ ТРЕБУЕТСЯ ДОСТУП ]", btn: "ИНИЦИАЛИЗАЦИЯ", greet: "СИСТЕМА: ИИ_МОДУЛЬ_АКТИВЕН.", maph: "> КАРТА_РЕЕСТРА", p1: "ИМЯ", p2: "ФАМИЛИЯ", p3: "ТЕЛЕФОН" }
        };

        // ГАРАНТИРОВАННОЕ УДАЛЕНИЕ ЗАСТАВКИ ЧЕРЕЗ 2 СЕКУНДЫ
        setTimeout(() => {
            const s = document.getElementById('splash');
            if(s) s.style.display = 'none';
        }, 2000);

        function chLang() {
            lang = lang === 'EN' ? 'RU' : 'EN';
            document.getElementById('l-cur').innerText = lang;
            const d = ui[lang];
            document.getElementById('l-welcome').innerText = d.welcome;
            document.getElementById('l-btn').innerText = d.btn;
            document.getElementById('l-greet').innerText = d.greet;
            document.getElementById('l-map-h').innerText = d.maph;
            document.getElementById('fn').placeholder = d.p1;
            document.getElementById('ln').placeholder = d.p2;
            document.getElementById('ph').placeholder = d.p3;
        }

        function openSys() {
            document.getElementById('scr-auth').style.display = 'none';
            document.getElementById('console').style.display = 'flex';
        }

        function nav(t, el) {
            document.getElementById('v-chat').style.display = (t === 'chat' ? 'flex' : 'none');
            document.getElementById('c-input').style.display = (t === 'chat' ? 'flex' : 'none');
            document.getElementById('v-maps').style.display = (t === 'maps' ? 'block' : 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function send() {
            const i = document.getElementById('m-val');
            if(!i.value) return;
            const b = document.getElementById('v-chat');
            b.innerHTML += <div class="msg user">> ${i.value}</div>;
            const v = i.value;
            i.value = '';
            setTimeout(() => {
                const r = lang === 'EN' ? "PROCESSING DATA: " : "ОБРАБОТКА ДАННЫХ: ";
                b.innerHTML += <div class="msg ai">${r} "${v.toUpperCase()}"... [OK]</div>;
                b.scrollTop = b.scrollHeight;
            }, 500);
        }
    </script>
</body>
</html>
