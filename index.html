<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH v12-REBORN</title>
    <style>
        :root { --gold: #f6851b; --bg: #000; --panel: #111; --text: #fff; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* СПЛЭШ (3 СЕКУНДЫ) - ЧИСТО БЕЛЫЙ ТЕКСТ */
        #splash {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .s-title { font-size: 48px; font-weight: 900; letter-spacing: 12px; color: #fff; }
        .s-sub { font-size: 11px; color: #fff; margin-top: 15px; text-align: center; max-width: 80%; line-height: 1.4; }

        /* ЭКРАНЫ */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; padding: 25px; background: #000; z-index: 1000; }
        .active { display: flex; }

        /* ЯЗЫКИ - 4 КНОПКИ */
        .lang-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .l-btn { border: 1px solid var(--border); padding: 8px 12px; font-size: 12px; cursor: pointer; color: #555; border-radius: 4px; }
        .l-btn.on { color: var(--gold); border-color: var(--gold); }

        /* ФОРМА */
        .f-box { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 12px; }
        input { background: #0a0a0a; border: 1px solid var(--border); padding: 18px; color: #fff; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-m { background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* БОКОВОЕ МЕНЮ С ИСТОРИЕЙ */
        #sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; background: #0a0a0a; z-index: 6000; transition: 0.3s; border-right: 1px solid var(--border); padding: 20px; }
        #sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5500; display: none; }
        .h-item { padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 14px; color: #777; }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }
        .content { flex: 1; overflow-y: auto; padding: 20px; }

        /* ЧАТ */
        .msg { padding: 12px; border-radius: 10px; font-size: 14px; max-width: 85%; margin-bottom: 10px; }
        .msg.ai { background: #111; border-left: 3px solid var(--gold); }
        .msg.u { background: var(--gold); color: #000; align-self: flex-end; margin-left: auto; font-weight: bold; }

        /* ФУТЕР - 4 КНОПКИ */
        footer { height: 90px; padding-bottom: 25px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); background: #050505; }
        .nav-btn { color: #444; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .nav-btn.on { color: var(--gold); }

        .input-ui { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="s-title">BSMLH</div>
        <div class="s-sub">BIOMETRIC SECURITY MULTI-FUNCTION LEDGER FOR HUMANITY</div>
    </div>

    <div id="scr-reg" class="screen">
        <div class="lang-bar">
            <div id="l-RU" class="l-btn on" onclick="setL('RU')">RU</div>
            <div id="l-EN" class="l-btn" onclick="setL('EN')">EN</div>
            <div id="l-AR" class="l-btn" onclick="setL('AR')">AR</div>
            <div id="l-CH" class="l-btn" onclick="setL('CH')">CH</div>
        </div>
        <h2 id="h-reg" style="margin-bottom: 20px;">РЕГИСТРАЦИЯ</h2>
        <div class="f-box">
            <input type="text" id="fn" placeholder="ИМЯ">
            <input type="text" id="ln" placeholder="ФАМИЛИЯ">
            <input type="tel" id="ph" placeholder="ТЕЛЕФОН">
            <button class="btn-m" id="b-reg" onclick="toApp()">ИНИЦИАЛИЗАЦИЯ</button>
        </div>
    </div>

    <div id="sidebar">
        <h3 style="color:var(--gold); margin-bottom:15px;">HISTORY</h3>
        <div id="h-list"></div>
    </div>
    <div class="overlay" id="over" onclick="side()"></div>

    <div id="main-app">
        <header>
            <div onclick="side()" style="font-size:24px; color:var(--gold);">☰</div>
            <div style="font-weight:900; letter-spacing:4px;">BSMLH</div>
            <div style="color:#222;">⋮</div>
        </header>

        <div class="content" id="scroller">
            <div id="v-chat" style="display: flex; flex-direction: column;">
                <div class="msg ai" id="ai-g">СИСТЕМА: ОНЛАЙН.</div>
            </div>
            <div id="v-prof" style="display:none; text-align:center;">
                <div style="background:#0a0a0a; padding:25px; border-radius:15px; border:1px solid var(--border);">
                    <div style="font-size:40px; margin-bottom:10px;">👤</div>
                    <h3 id="u-name">USER</h3>
                    <p style="color:var(--gold); font-size:11px; margin-top:5px;">STATUS: vHUID-ENCRYPTED</p>
                    <button class="btn-m" style="width:100%; margin-top:20px;" onclick="location.reload()">LOGOUT</button>
                </div>
            </div>
        </div>

        <div class="input-ui" id="chat-ui">
            <input type="text" id="m-in" placeholder=">_" style="flex:1;">
            <button onclick="send()" style="background:var(--gold); border:none; padding:0 15px; border-radius:8px; font-weight:bold;">></button>
        </div>

        <footer>
            <div id="n-chat" class="nav-btn on" onclick="tab('chat')">CHAT</div>
            <div class="nav-btn">MAPS</div>
            <div class="nav-btn">HUB</div>
            <div id="n-prof" class="nav-btn" onclick="tab('prof')">PROFILE</div>
        </footer>
    </div>

    <script>
        // СПЛЭШ ГАРАНТИРОВАННО СЧЕЗАЕТ (v12 STYLE)
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('scr-reg').classList.add('active');
        }, 3000);

        const voc = {
            'RU': { h: "РЕГИСТРАЦИЯ", b: "ИНИЦИАЛИЗАЦИЯ", g: "СИСТЕМА: ГОТОВА.", p: "ПРОФИЛЬ", f: "ИМЯ", l: "ФАМИЛИЯ", ph: "ТЕЛЕФОН" },
            'EN': { h: "REGISTRATION", b: "INITIALIZE", g: "SYSTEM: READY.", p: "PROFILE", f: "NAME", l: "SURNAME", ph: "PHONE" },
            'AR': { h: "تسجيل", b: "تهيئة", g: "النظام: جاهز", p: "الملف الشخصي", f: "اسم", l: "لقб", ph: "هاتف" },
            'CH': { h: "注册", b: "初始化", g: "系统：就绪", p: "个人资料", f: "名字", l: "姓", ph: "电话" }
        };
        let curL = 'RU';

        // 10 ИМЕН В ИСТОРИИ
        const names = ["Alex", "Sarah", "Ahmed", "Li Wei", "Maria", "Ivan", "Fatima", "Chen", "John", "Elena"];
        names.forEach(n => document.getElementById('h-list').innerHTML += <div class="h-item">Log_${n}</div>);

        function setL(l) {
            curL = l;
            document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('on'));
            document.getElementById('l-'+l).classList.add('on');
            document.getElementById('h-reg').innerText = voc[l].h;
            document.getElementById('b-reg').innerText = voc[l].b;
            document.getElementById('ai-g').innerText = voc[l].g;
            document.getElementById('n-prof').innerText = voc[l].p;
            document.getElementById('fn').placeholder = voc[l].f;
            document.getElementById('ln').placeholder = voc[l].l;
            document.getElementById('ph').placeholder = voc[l].ph;
        }

        function toApp() {
            document.getElementById('u-name').innerText = document.getElementById('fn').value + " " + document.getElementById('ln').value;
            document.getElementById('scr-reg').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }

        function side() {
            const s = document.getElementById('sidebar');
            s.classList.toggle('open');
            document.getElementById('over').style.display = s.classList.contains('open') ? 'block' : 'none';
        }

        function tab(t) {
            document.getElementById('v-chat').style.display = (t === 'chat' ? 'flex' : 'none');
            document.getElementById('chat-ui').style.display = (t === 'chat' ? 'flex' : 'none');
            document.getElementById('v-prof').style.display = (t === 'prof' ? 'block' : 'none');
            document.getElementById('n-chat').classList.toggle('on', t === 'chat');
            document.getElementById('n-prof').classList.toggle('on', t === 'prof');
        }

        function send() {
            const i = document.getElementById('m-in'); if(!i.value) return;
            const v = document.getElementById('v-chat');
            v.innerHTML += <div class="msg u">${i.value}</div>;
            i.value = '';
            setTimeout(() => {
                v.innerHTML += <div class="msg ai">ANALYSIS COMPLETE. STATUS: OK.</div>;
                document.getElementById('scroller').scrollTop = v.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
