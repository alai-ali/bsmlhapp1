<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | Terminal v13</title>
    <style>
        :root { 
            --gold: #f6851b; 
            --bg: radial-gradient(circle, #1a1a1a 0%, #050505 100%); 
            --panel: #0d0d0d;
            --text: #ffffff;
            --border: #222;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: #050505; color: var(--text); height: 100vh; overflow: hidden; }

        /* СТАТИЧНАЯ ЗАСТАВКА - ИСЧЕЗАЕТ ЧЕРЕЗ 3 СЕКУНДЫ */
        #splash {
            position: fixed; inset: 0; z-index: 10000;
            background: #000; display: flex; align-items: center; justify-content: center;
            animation: fadeOut 0.5s forwards 3s; pointer-events: none;
        }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .splash-logo {
            font-size: 50px; font-weight: 900; letter-spacing: 15px;
            color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: burn 2s ease-in-out infinite;
        }
        @keyframes burn { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; text-shadow: 0 0 40px #fff; } }

        /* ЭКРАНЫ */
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 40px 25px; }
        .active-screen { display: flex; }

        .lang-node { position: absolute; top: 40px; right: 25px; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; font-weight: bold; cursor: pointer; }

        .f-box { width: 100%; max-width: 350px; margin-top: 60px; display: flex; flex-direction: column; gap: 12px; }
        input { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); 
            padding: 20px; color: #fff; border-radius: 0; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--gold); }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 22px; font-weight: 900; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; }

        /* ПРИЛОЖЕНИЕ */
        #app { display: none; height: 100vh; flex-direction: column; }
        header { 
            height: 70px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; border-bottom: 1px solid var(--border); background: #000;
        }

        main { flex: 1; overflow-y: auto; padding: 20px; }
        
        /* ЧАТ ТЕРМИНАЛ */
        #v-chat { display: flex; flex-direction: column; gap: 10px; }
        .line { padding: 12px; border: 1px solid var(--border); font-size: 14px; max-width: 85%; line-height: 1.5; }
        .line.ai { border-left: 4px solid var(--gold); background: #0a0a0a; align-self: flex-start; }
        .line.user { align-self: flex-end; color: var(--gold); border-color: var(--gold); }

        /* КАРТА ТЕКСТОМ */
        #v-maps { text-align: center; color: var(--gold); font-family: monospace; }
        .map-grid { border: 1px dashed #333; padding: 40px 20px; margin-top: 20px; background: #050505; }

        /* НИЖНЯЯ ПАНЕЛЬ (ПОДНЯТАЯ) */
        footer { 
            height: 100px; padding-bottom: 35px; /* Подняли иконки */
            display: flex; justify-content: space-around; align-items: center;
            background: #000; border-top: 1px solid var(--border);
        }
        .nav-item { color: #444; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .input-bar { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); background: #000; }
        .input-bar input { flex: 1; padding: 12px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">BSMLH</div>
    </div>

    <div id="scr-reg" class="screen active-screen">
        <div class="lang-node" onclick="swapL()">🌐 <span id="l-cur">RU</span></div>
        <h2 id="t-welcome" style="margin-top:40px; font-weight: 300; letter-spacing: 2px;">WELCOME</h2>
        <div class="f-box">
            <input type="text" id="fn" placeholder="FIRST NAME">
            <input type="text" id="ln" placeholder="LAST NAME">
            <input type="tel" id="ph" placeholder="PHONE">
            <button class="btn-main" id="t-btn" onclick="enter()">INITIALIZE</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="color:var(--gold); font-size:20px;">[=]</div>
            <div style="font-weight:900; letter-spacing:5px;">BSMLH</div>
            <div onclick="location.reload()" style="font-size:12px; color:#444;">LOGOUT</div>
        </header>

        <main>
            <div id="tab-chat">
                <div id="chat-list" style="display:flex; flex-direction:column; gap:10px;">
                    <div class="line ai" id="t-greet">SYSTEM: AI_MODULE_CONNECTED. READY FOR INPUT.</div>
                </div>
            </div>

            <div id="tab-maps" style="display:none;">
                <div class="map-grid">
                    [ SECTOR: GLOBAL_LEDGER ]<br><br>
                    LAT: 55.7558<br>
                    LON: 37.6173<br><br>
                    STATUS: SECURE_LINK_ACTIVE
                </div>
                <h3 id="t-map-h" style="margin-top:20px; font-weight:normal;">> SCANNING_RESOURCES...</h3>
            </div>
        </main>

        <div class="input-bar" id="chat-input">
            <input type="text" id="msg" placeholder=">_">
            <button onclick="send()" style="background:var(--gold); border:none; padding:0 20px; font-weight:900;">></button>
        </div>

        <footer>
            <div class="nav-item active" onclick="nav('chat', this)">CHAT</div>
            <div class="nav-item" onclick="nav('maps', this)">MAPS</div>
            <div class="nav-item">HUB</div>
            <div class="nav-item" id="n-prof">PROFILE</div>
        </footer>
    </div>

    <script>
        let curL = 'RU';
        const dict = {
            'EN': { welcome: "WELCOME", btn: "INITIALIZE", greet: "SYSTEM: AI_MODULE_ONLINE.", maph: "> DIGITAL_LEDGER_MAP", prof: "PROFILE", p1: "FIRST NAME", p2: "LAST NAME", p3: "PHONE" },
            'RU': { welcome: "ДОБРО ПОЖАЛОВАТЬ", btn: "ЗАПУСК", greet: "СИСТЕМА: ИИ-МОДУЛЬ ПОДКЛЮЧЕН.", maph: "> КАРТА РЕЕСТРА", prof: "ПРОФИЛЬ", p1: "ИМЯ", p2: "ФАМИЛИЯ", p3: "ТЕЛЕФОН" }
        };

        function swapL() {
            curL = curL === 'EN' ? 'RU' : 'EN';
            document.getElementById('l-cur').innerText = curL;
            const d = dict[curL];
            document.getElementById('t-welcome').innerText = d.welcome;
            document.getElementById('t-btn').innerText = d.btn;
            document.getElementById('t-greet').innerText = d.greet;
            document.getElementById('t-map-h').innerText = d.maph;
            document.getElementById('n-prof').innerText = d.prof;
            document.getElementById('fn').placeholder = d.p1;
            document.getElementById('ln').placeholder = d.p2;
            document.getElementById('ph').placeholder = d.p3;
        }

        function enter() {
            document.getElementById('scr-reg').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        }

        function nav(t, el) {
            document.getElementById('tab-chat').style.display = (t === 'chat' ? 'block' : 'none');
            document.getElementById('chat-input').style.display = (t === 'chat' ? 'flex' : 'none');
            document.getElementById('tab-maps').style.display = (t === 'maps' ? 'block' : 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function send() {
            const i = document.getElementById('msg');
            if(!i.value) return;
            const list = document.getElementById('chat-list');
            list.innerHTML += <div class="line user">> ${i.value}</div>;
            const val = i.value;
            i.value = '';
            setTimeout(() => {
                const r = curL === 'EN' ? "PROCESSING_DATA: " : "ОБРАБОТКА ДАННЫХ: ";
                list.innerHTML += <div class="line ai">${r} "${val.toUpperCase()}"... [DONE]</div>;
                list.parentElement.scrollTop = list.parentElement.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
