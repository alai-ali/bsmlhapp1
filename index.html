<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | Terminal v16</title>
    <style>
        :root { --gold: #f6851b; --bg: #000; --panel: #0d0d0d; --text: #fff; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; width: 100%; }

        /* SPLASH - ГАРАНТИРОВАННОЕ СКРЫТИЕ ЧЕРЕЗ CSS */
        #splash {
            position: fixed; inset: 0; z-index: 99999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
            animation: hideSplash 0.5s forwards 3s; /* Исчезнет ровно через 3 сек */
            pointer-events: none;
        }
        @keyframes hideSplash { to { opacity: 0; visibility: hidden; } }
        .s-title { font-size: 54px; font-weight: 900; letter-spacing: 15px; color: #fff; margin-bottom: 15px; }
        .s-sub { font-size: 13px; color: #fff; font-weight: bold; letter-spacing: 1px; max-width: 85%; line-height: 1.4; text-transform: uppercase; }

        /* SCREENS */
        .screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 30px; overflow-y: auto; }
        .active-screen { display: flex; }

        /* LANG SELECTOR */
        .lang-bar { width: 100%; display: flex; justify-content: center; gap: 10px; margin: 10px 0 30px 0; }
        .l-btn { border: 1px solid var(--border); padding: 10px 15px; font-size: 12px; cursor: pointer; color: #555; font-weight: bold; border-radius: 5px; }
        .l-btn.on { color: var(--gold); border-color: var(--gold); background: rgba(246, 133, 27, 0.1); }

        .f-box { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; }
        input { background: #111; border: 1px solid var(--border); padding: 20px; color: #fff; border-radius: 12px; font-size: 16px; outline: none; width: 100%; }
        input:focus { border-color: var(--gold); }
        .btn-m { background: var(--gold); color: #000; border: none; padding: 22px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }

        /* SIDEBAR */
        #sidebar { 
            position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; 
            background: #0a0a0a; z-index: 6000; transition: 0.3s; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 25px;
        }
        #sidebar.open { left: 0; }
        .s-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5500; display: none; }
        .hist-item { padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 14px; color: #777; cursor: pointer; }

        /* APP */
        #app { display: none; height: 100vh; flex-direction: column; background: #000; }
        header { height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }
        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        .view { display: none; flex-direction: column; gap: 15px; width: 100%; }
        .v-active { display: flex; }
        
        /* CHAT */
        .msg { padding: 15px; border-radius: 12px; font-size: 14px; max-width: 85%; line-height: 1.4; }
        .msg.ai { background: #111; border-left: 4px solid var(--gold); align-self: flex-start; }
        .msg.u { background: var(--gold); color: #000; align-self: flex-end; font-weight: bold; }

        /* PROFILE */
        .prof-card { background: #0a0a0a; border: 1px solid var(--border); padding: 30px; border-radius: 20px; text-align: center; width: 100%; }
        .avatar { width: 80px; height: 80px; background: #222; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; }

        /* FOOTER (LIFTED) */
        footer { height: 100px; padding-bottom: 35px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); background: #050505; }
        .nav-l { color: #555; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .nav-l.active { color: var(--gold); }

        .in-bar { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); background: #000; }
        .in-bar input { flex: 1; padding: 12px; border-radius: 10px; background: #111; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="s-title">BSMLH</div>
        <div class="s-sub">BIOMETRIC SECURITY MULTI-FUNCTION LEDGER FOR HUMANITY</div>
    </div>

    <div id="scr-reg" class="screen active-screen">
        <div class="lang-bar">
            <div id="l-RU" class="l-btn on" onclick="changeLang('RU')">RU</div>
            <div id="l-EN" class="l-btn" onclick="changeLang('EN')">EN</div>
            <div id="l-AR" class="l-btn" onclick="changeLang('AR')">AR</div>
            <div id="l-CH" class="l-btn" onclick="changeLang('CH')">CH</div>
        </div>
        <h2 id="reg-h" style="margin-bottom: 20px; letter-spacing: 1px;">РЕГИСТРАЦИЯ</h2>
        <div class="f-box">
            <input type="text" id="fn" placeholder="ИМЯ">
            <input type="text" id="ln" placeholder="ФАМИЛИЯ">
            <input type="tel" id="ph" placeholder="ТЕЛЕФОН">
            <button class="btn-m" id="reg-b" onclick="startApp()">ИНИЦИАЛИЗАЦИЯ</button>
        </div>
    </div>

    <div id="sidebar">
        <h3 style="color:var(--gold); margin-bottom:25px; letter-spacing: 2px;">HISTORY</h3>
        <div id="hist-list" style="overflow-y: auto;"></div>
    </div>
    <div class="s-overlay" id="overlay" onclick="closeSide()"></div>

    <div id="app">
        <header>
            <div onclick="openSide()" style="font-size:26px; color:var(--gold); cursor:pointer;">☰</div>
            <div style="font-weight:900; letter-spacing:4px; font-size: 18px;">BSMLH</div>
            <div style="color:#222; font-size:22px;">⋮</div>
        </header>

        <main id="scroll-area">
            <div id="v-chat" class="view v-active">
                <div class="msg ai" id="ai-g">СИСТЕМА: ИНИЦИАЛИЗАЦИЯ ЗАВЕРШЕНА.</div>
            </div>
            <div id="v-prof" class="view">
                <div class="prof-card">
                    <div class="avatar">👤</div>
                    <h3 id="p-full-name">USER NAME</h3>
                    <p style="color:var(--gold); margin-top:10px; font-size: 12px; font-family: monospace;">STATUS: vHUID-ENCRYPTED</p>
                    <button class="btn-m" style="width:100%; margin-top:30px; background: transparent; border: 1px solid var(--border); color: #fff;" onclick="location.reload()">LOGOUT</button>
                </div>
            </div>
        </main>

        <div class="in-bar" id="input-ui">
            <input type="text" id="m-text" placeholder=">_">
            <button onclick="handleSend()" style="background:var(--gold); border:none; padding:0 20px; border-radius:10px; font-weight:bold;">></button>
        </div>

        <footer>
            <div id="n-chat" class="nav-l active" onclick="showTab('chat')">CHAT</div>
            <div class="nav-l">MAPS</div>
            <div class="nav-l">HUB</div>
            <div id="n-prof" class="nav-l" onclick="showTab('prof')">PROFILE</div>
        </footer>
    </div>

    <script>
        // СЛОВАРЬ
        const translations = {
            'RU': { h: "РЕГИСТРАЦИЯ", b: "ИНИЦИАЛИЗАЦИЯ", g: "СИСТЕМА: ГОТОВА К РАБОТЕ.", p: "ПРОФИЛЬ", p1: "ИМЯ", p2: "ФАМИЛИЯ", p3: "ТЕЛЕФОН", ai: "АНАЛИЗ ДАННЫХ... ОК." },
            'EN': { h: "REGISTRATION", b: "INITIALIZE", g: "SYSTEM: ONLINE.", p: "PROFILE", p1: "NAME", p2: "SURNAME", p3: "PHONE", ai: "DATA ANALYSIS... OK." },
            'AR': { h: "تسجيل", b: "تهيئة", g: "النظام: جاهز", p: "الملف الشخصي", p1: "اسم", p2: "لقб", p3: "هاتف", ai: "تحليل البيانات... حسنا" },
            'CH': { h: "注册", b: "初始化", g: "系统：在线", p: "个人资料", p1: "名字", p2: "姓", p3: "电话", ai: "数据分析... 完成" }
        };
        
        let currentLang = 'RU';

        // ИСТОРИЯ
        const users = ["Alex", "Sarah", "Ahmed", "Li Wei", "Maria", "Ivan", "Fatima", "Chen", "John", "Elena"];
        const hContainer = document.getElementById('hist-list');
        users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'hist-item';
            div.innerText = Log: session_with_${u};
            div.onclick = closeSide;
            hContainer.appendChild(div);
        });

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('on'));
            document.getElementById('l-'+lang).classList.add('on');
            
            const t = translations[lang];
            document.getElementById('reg-h').innerText = t.h;
            document.getElementById('reg-b').innerText = t.b;
            document.getElementById('ai-g').innerText = t.g;
            document.getElementById('n-prof').innerText = t.p;
            document.getElementById('fn').placeholder = t.p1;
            document.getElementById('ln').placeholder = t.p2;
            document.getElementById('ph').placeholder = t.p3;
        }

        function startApp() {
            const name = document.getElementById('fn').value;
            const surname = document.getElementById('ln').value;
            if(!name) return alert("Enter Name");
            
            document.getElementById('p-full-name').innerText = name + " " + surname;
            document.getElementById('scr-reg').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        }

        function openSide() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeSide() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }

        function showTab(type) {
            document.getElementById('v-chat').classList.toggle('v-active', type === 'chat');
            document.getElementById('input-ui').style.display = (type === 'chat' ? 'flex' : 'none');
            document.getElementById('v-prof').classList.toggle('v-active', type === 'prof');
            
            document.getElementById('n-chat').classList.toggle('active', type === 'chat');
            document.getElementById('n-prof').classList.toggle('active', type === 'prof');
        }

        function handleSend() {
            const input = document.getElementById('m-text');
            if(!input.value) return;
            
            const chat = document.getElementById('v-chat');
            chat.innerHTML += <div class="msg u">${input.value}</div>;
            const userMsg = input.value.toLowerCase();
            input.value = '';

            setTimeout(() => {
                let response = translations[currentLang].ai;
                if(userMsg.includes("привет") || userMsg.includes("hello")) {
                    response = currentLang === 'RU' ? "Система приветствует вас." : "System greets you.";
                }
                chat.innerHTML += <div class="msg ai">${response}</div>;
                document.getElementById('scroll-area').scrollTop = chat.scrollHeight;
            }, 700);
        }
    </script>
</body>
</html>
