<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH v6.2 Fixed</title>
    <style>
        :root { --gold: #f6851b; --bg: #000; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* ЗАСТАВКА - ИСЧЕЗНЕТ САМА ЧЕРЕЗ 3 СЕКУНДЫ В ЛЮБОМ СЛУЧАЕ */
        #splash {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeOut 0.5s forwards 3s; /* Авто-удаление через CSS */
            pointer-events: none;
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        .s-title { font-size: 50px; font-weight: 900; letter-spacing: 12px; color: #fff; }
        .s-sub { font-size: 10px; color: #fff; margin-top: 15px; text-align: center; max-width: 80%; text-transform: uppercase; }

        /* ЭКРАН РЕГИСТРАЦИИ */
        #scr-reg { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; padding: 25px; background: #000; z-index: 1000;
        }

        /* ГЛОБУС */
        .lang-wrapper { position: absolute; top: 20px; right: 20px; z-index: 2000; }
        .globe-icon { font-size: 28px; cursor: pointer; color: #fff; opacity: 0.7; }
        
        .lang-dropdown { 
            position: absolute; top: 40px; right: 0; background: #111; border: 1px solid #333; 
            border-radius: 12px; display: none; flex-direction: column; width: 110px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .lang-dropdown div { padding: 15px; font-size: 14px; text-align: center; cursor: pointer; border-bottom: 1px solid #222; }
        .lang-dropdown div:active { background: var(--gold); color: #000; }

        /* ФОРМА (4 ПОЛЯ) */
        .f-box { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        input { background: #111 !important; border: 1px solid #333; padding: 16px; color: #fff !important; border-radius: 12px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-m { background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: bold; text-transform: uppercase; margin-top: 10px; cursor: pointer; }

        /* ПРИЛОЖЕНИЕ */
        #app { display: none; height: 100vh; flex-direction: column; background: #000; position: absolute; inset: 0; z-index: 3000; }
        header { height: 70px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #222; }
        .main { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { padding: 15px; border-radius: 12px; font-size: 14px; background: #111; border-left: 4px solid var(--gold); }

        footer { height: 100px; padding-bottom: 35px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; background: #050505; }
        .n-btn { color: #444; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .n-btn.on { color: var(--gold); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="s-title">BSMLH</div>
        <div class="s-sub">BIOMETRIC SECURITY MULTI-FUNCTION LEDGER FOR HUMANITY</div>
    </div>

    <div id="scr-reg">
        <div class="lang-wrapper">
            <div class="globe-icon" onclick="toggleLang()">🌐</div>
            <div id="lang-menu" class="lang-dropdown">
                <div onclick="selectL('RU')">RU</div>
                <div onclick="selectL('EN')">EN</div>
                <div onclick="selectL('AR')">AR</div>
                <div onclick="selectL('CH')">CH</div>
            </div>
        </div>

        <h2 id="h-title" style="margin-top: 60px; letter-spacing: 1px;">РЕГИСТРАЦИЯ</h2>
        
        <div class="f-box">
            <input type="text" id="in-f" placeholder="ИМЯ">
            <input type="text" id="in-l" placeholder="ФАМИЛИЯ">
            <input type="tel" id="in-p" placeholder="НОМЕР ТЕЛЕФОНА">
            <input type="email" id="in-e" placeholder="ПОЧТА">
            <button id="b-enter" class="btn-m" onclick="go()">ВОЙТИ</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="font-weight:900; letter-spacing:4px;">BSMLH</div>
        </header>
        <div class="main">
            <div id="ai-status" class="msg">СИСТЕМА ОНЛАЙН</div>
        </div>
        <footer>
            <div class="n-btn on">CHAT</div>
            <div class="n-btn">MAPS</div>
            <div class="n-btn">HUB</div>
            <div id="n-prof" class="n-btn">PROFILE</div>
        </footer>
    </div>

    <script>
        const langPack = {
            'RU': { title: "РЕГИСТРАЦИЯ", button: "ВОЙТИ", f: "ИМЯ", l: "ФАМИЛИЯ", p: "НОМЕР ТЕЛЕФОНА", e: "ПОЧТА", status: "СИСТЕМА ОНЛАЙН" },
            'EN': { title: "REGISTRATION", button: "ENTER", f: "NAME", l: "SURNAME", p: "PHONE NUMBER", e: "EMAIL", status: "SYSTEM ONLINE" },
            'AR': { title: "تسجيل", button: "دخول", f: "اسم", l: "لقب", p: "رقم الهاتف", e: "بريد", status: "النظام متصل" },
            'CH': { title: "注册", button: "登录", f: "名字", l: "姓", p: "电话号码", e: "电子邮件", status: "系统在线" }
        };

        function toggleLang() {
            const m = document.getElementById('lang-menu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function selectL(lang) {
            const d = langPack[lang];
            document.getElementById('h-title').innerText = d.title;
            document.getElementById('b-enter').innerText = d.button;
            document.getElementById('in-f').placeholder = d.f;
            document.getElementById('in-l').placeholder = d.l;
            document.getElementById('in-p').placeholder = d.p;
            document.getElementById('in-e').placeholder = d.e;
            document.getElementById('ai-status').innerText = d.status;
            document.getElementById('lang-menu').style.display = 'none';
        }

        function go() {
            if(!document.getElementById('in-f').value) return;
            document.getElementById('app').style.display = 'flex';
        }
    </script>
</body>
</html>
