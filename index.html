<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH v6.1 | Stage 1</title>
    <style>
        :root { --gold: #f6851b; --bg: #000; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; }

        /* ЗАСТАВКА - БЕЛЫЕ БУКВЫ */
        #splash {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .s-title { font-size: 50px; font-weight: 900; letter-spacing: 12px; color: #fff; }
        .s-sub { font-size: 10px; color: #fff; margin-top: 15px; letter-spacing: 1px; text-align: center; max-width: 80%; }

        /* ЭКРАН РЕГИСТРАЦИИ */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; padding: 25px; background: #000; z-index: 1000; }
        .active { display: flex; }

        /* ЯЗЫКОВАЯ ПАНЕЛЬ */
        .lang-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 320px; margin-top: 30px; }
        .l-btn { border: 1px solid #333; padding: 10px; text-align: center; font-size: 12px; border-radius: 8px; color: #666; cursor: pointer; }
        .l-btn.on { border-color: var(--gold); color: var(--gold); background: rgba(246, 133, 27, 0.1); }

        /* ФОРМА */
        .f-box { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        input { background: #111; border: 1px solid #333; padding: 18px; color: #fff; border-radius: 12px; font-size: 16px; outline: none; }
        .btn-m { background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: bold; text-transform: uppercase; margin-top: 10px; cursor: pointer; }

        #app { display: none; height: 100vh; flex-direction: column; }
        header { height: 70px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #222; }
        .main { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { padding: 15px; border-radius: 12px; font-size: 14px; margin-bottom: 12px; max-width: 85%; background: #111; border-left: 4px solid var(--gold); }

        footer { height: 100px; padding-bottom: 35px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; background: #050505; }
        .n-btn { color: #444; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .n-btn.on { color: var(--gold); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="s-title">BSMLH</div>
        <div class="s-sub">BIOMETRIC SECURITY MULTI-FUNCTION LEDGER FOR HUMANITY</div>
    </div>

    <div id="scr-reg" class="screen">
        <div class="lang-grid">
            <div id="l-RU" class="l-btn on" onclick="changeL('RU')">RU</div>
            <div id="l-EN" class="l-btn" onclick="changeL('EN')">EN</div>
            <div id="l-AR" class="l-btn" onclick="changeL('AR')">AR</div>
            <div id="l-CH" class="l-btn" onclick="setLangCH()">CH</div>
        </div>

        <h2 id="h-title" style="margin-top: 30px; letter-spacing: 1px;">РЕГИСТРАЦИЯ</h2>
        
        <div class="f-box">
            <input type="text" id="fn" placeholder="ИМЯ">
            <button id="b-enter" class="btn-m" onclick="go()">ВОЙТИ</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="font-weight:900; letter-spacing:4px;">BSMLH</div>
        </header>
        <div class="main">
            <div id="ai-status" class="msg">СИСТЕМА ОНЛАЙН</div>
        </div>
        <footer>
            <div class="n-btn on">CHAT</div>
            <div class="n-btn">MAPS</div>
            <div class="n-btn">HUB</div>
            <div id="n-prof" class="n-btn">PROFILE</div>
        </footer>
    </div>

    <script>
        // Данные для перевода
        const langPack = {
            'RU': { title: "РЕГИСТРАЦИЯ", button: "ВОЙТИ", placeholder: "ИМЯ", status: "СИСТЕМА ОНЛАЙН", profile: "ПРОФИЛЬ" },
            'EN': { title: "REGISTRATION", button: "ENTER", placeholder: "NAME", status: "SYSTEM ONLINE", profile: "PROFILE" },
            'AR': { title: "تسجيل", button: "دخول", placeholder: "اسم", status: "النظام متصل", profile: "الملف الشخصي" },
            'CH': { title: "注册", button: "登录", placeholder: "名字", status: "系统在线", profile: "个人资料" }
        };

        // Исчезновение заставки
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('scr-reg').classList.add('active');
        }, 2000);

        // Функция смены языка
        function changeL(lang) {
            // Визуальное переключение кнопок
            document.querySelectorAll('.l-btn').forEach(btn => btn.classList.remove('on'));
            document.getElementById('l-' + lang).classList.add('on');

            // Смена текстов
            const data = langPack[lang];
            document.getElementById('h-title').innerText = data.title;
            document.getElementById('b-enter').innerText = data.button;
            document.getElementById('fn').placeholder = data.placeholder;
            document.getElementById('ai-status').innerText = data.status;
            document.getElementById('n-prof').innerText = data.profile;
        }

        // Отдельная функция для CH (для надежности теста)
        function setLangCH() { changeL('CH'); }

        function go() {
            if(!document.getElementById('fn').value) return;
            document.getElementById('scr-reg').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        }
    </script>
</body>
</html>
