<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | Final Fortress</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #0a0a0a; --text: #fff; --border: rgba(255,255,255,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* АВАРИЙНО-УСТОЙЧИВАЯ ЗАСТАВКА */
        #splash {
            position: fixed; inset: 0; z-index: 99999;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        .logo-static {
            font-size: 55px; font-weight: 900; letter-spacing: 18px; color: #fff;
            animation: pulse-glow 2s infinite; text-align: center; margin-left: 18px;
        }
        @keyframes pulse-glow { 
            0%, 100% { opacity: 0.15; text-shadow: 0 0 10px rgba(255,255,255,0); }
            50% { opacity: 1; text-shadow: 0 0 40px rgba(255,255,255,0.6); } 
        }

        /* ЭКРАНЫ */
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 50px 25px; }
        .active-screen { display: flex; }

        .lang-btn { position: absolute; top: 45px; right: 25px; color: var(--gold); font-weight: bold; cursor: pointer; border: 1px solid var(--border); padding: 8px 12px; border-radius: 10px; }

        .form-wrap { width: 100%; max-width: 360px; margin-top: 60px; display: flex; flex-direction: column; gap: 12px; }
        input { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; color: #fff; outline: none; font-size: 16px; }
        .btn-core { background: var(--gold); color: #000; border: none; padding: 22px; border-radius: 15px; font-weight: 900; cursor: pointer; letter-spacing: 1px; }

        /* ПРИЛОЖЕНИЕ */
        #app { display: none; height: 100vh; flex-direction: column; }
        header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-bottom: 1px solid var(--border); }

        /* ФУТУРИСТИЧЕСКИЙ РАДАР */
        .radar-box {
            width: 100%; height: 280px; background: #000; border-radius: 25px;
            border: 1px solid #151515; position: relative; overflow: hidden;
            background-image: radial-gradient(circle, #111 1px, transparent 1px); background-size: 30px 30px;
        }
        .radar-pulse {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 50%;
            animation: pulse-out 4s linear infinite;
        }
        @keyframes pulse-out { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 400px; height: 400px; opacity: 0; } }
        .scanner-line { width: 100%; height: 100px; background: linear-gradient(0deg, rgba(212,175,55,0.1), transparent); position: absolute; bottom: -100px; animation: scan-move 3s ease-in-out infinite; }
        @keyframes scan-move { 0%, 100% { bottom: -100px; } 50% { bottom: 100%; } }

        /* ЧАТ */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 15px 20px; border-radius: 20px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .bubble.ai { background: var(--panel); border: 1px solid var(--border); align-self: flex-start; }
        .bubble.user { background: var(--gold); color: #000; align-self: flex-end; font-weight: 600; }

        /* ФУТЕР (ПОДНЯТ) */
        footer { height: 100px; padding-bottom: 35px; display: flex; justify-content: space-around; align-items: center; background: #000; border-top: 1px solid var(--border); }
        .nav-btn { color: #333; font-size: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn i { font-size: 28px; display: block; margin-bottom: 4px; }

        .chat-input { padding: 15px 20px; display: flex; gap: 12px; background: #000; border-top: 1px solid var(--border); }
        .chat-input input { flex: 1; padding: 12px; border-radius: 20px; background: #111; border: none; color: #fff; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-static">BSMLH</div>
        <div style="font-size: 9px; color: #333; letter-spacing: 6px; margin-top: 25px;">SECURE LEDGER INITIALIZING</div>
    </div>

    <div id="scr-reg" class="screen active-screen">
        <div class="lang-btn" onclick="setLang()">🌐 <span id="l-btn">EN</span></div>
        <h1 id="r-welcome" style="font-weight: 200; margin-top: 40px;">Welcome</h1>
        <div class="form-wrap">
            <input type="text" id="fn" placeholder="First Name">
            <input type="text" id="ln" placeholder="Last Name">
            <input type="tel" id="ph" placeholder="Phone Number">
            <button class="btn-core" id="r-btn" onclick="startApp()">CONTINUE</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="color: var(--gold); font-size: 22px;">☰</div>
            <div style="letter-spacing: 5px; font-weight: 900; font-size: 14px;">BSMLH</div>
            <div style="font-size: 22px;">⋮</div>
        </header>

        <main style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <div id="t-chat" class="chat-container">
                <div class="bubble ai" id="ai-msg">System Active. AI Assistant Online.</div>
            </div>
            <div class="chat-input" id="chat-box">
                <input type="text" id="msg-in" placeholder="...">
                <button onclick="sendMsg()" style="background:none; border:none; color:var(--gold); font-size:26px;">▲</button>
            </div>

            <div id="t-maps" style="display:none; padding:25px;">
                <div class="radar-box">
                    <div class="scanner-line"></div>
                    <div class="radar-pulse"></div>
                    <div class="radar-pulse" style="animation-delay: 2s;"></div>
                    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--gold); font-size:10px; font-weight:900;">SCANNING...</div>
                </div>
                <h2 id="m-title" style="margin-top:25px; font-weight:300;">Global Ledger Map</h2>
            </div>
        </main>

        <footer>
            <div class="nav-btn active" onclick="tab('chat', this)"><i>💬</i><span id="n-chat">CHAT</span></div>
            <div class="nav-btn" onclick="tab('maps', this)"><i>📡</i><span id="n-maps">MAPS</span></div>
            <div class="nav-btn"><i>🚀</i>HUB</div>
            <div class="nav-btn" onclick="location.reload()"><i>👤</i>OFF</div>
        </footer>
    </div>

    <script>
        let curLang = 'EN';
        const dict = {
            'EN': { welcome: "Welcome", btn: "Continue", chat: "CHAT", maps: "MAPS", ai: "AI Online. How can I assist?", maph: "Global Ledger Map", ph1: "First Name", ph2: "Last Name", ph3: "Phone Number" },
            'RU': { welcome: "Добро пожаловать", btn: "Далее", chat: "ЧАТ", maps: "КАРТЫ", ai: "ИИ на связи. Чем помочь?", maph: "Глобальная карта", ph1: "Имя", ph2: "Фамилия", ph3: "Номер телефона" }
        };

        // АВАРИЙНЫЙ ТАЙМЕР ДЛЯ ЗАСТАВКИ (3.5 секунды)
        function killSplash() {
            const s = document.getElementById('splash');
            if(s) {
                s.style.opacity = '0';
                setTimeout(() => { s.style.display = 'none'; }, 600);
            }
        }
        window.addEventListener('load', killSplash);
        setTimeout(killSplash, 3500); // Принудительный запуск через 3.5 сек

        function setLang() {
            curLang = curLang === 'EN' ? 'RU' : 'EN';
            document.getElementById('l-btn').innerText = curLang;
            const d = dict[curLang];
            document.getElementById('r-welcome').innerText = d.welcome;
            document.getElementById('r-btn').innerText = d.btn;
            document.getElementById('n-chat').innerText = d.chat;
            document.getElementById('n-maps').innerText = d.maps;
            document.getElementById('ai-msg').innerText = d.ai;
            document.getElementById('m-title').innerText = d.maph;
            document.getElementById('fn').placeholder = d.ph1;
            document.getElementById('ln').placeholder = d.ph2;
            document.getElementById('ph').placeholder = d.ph3;
        }

        function startApp() {
            document.getElementById('scr-reg').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        }

        function tab(t, el) {
            document.getElementById('t-chat').style.display = (t === 'chat' ? 'flex' : 'none');
            document.getElementById('chat-box').style.display = (t === 'chat' ? 'flex' : 'none');
            document.getElementById('t-maps').style.display = (t === 'maps' ? 'block' : 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function sendMsg() {
            const inp = document.getElementById('msg-in');
            if(!inp.value) return;
            const container = document.getElementById('t-chat');
            container.innerHTML += <div class="bubble user">${inp.value}</div>;
            const txt = inp.value;
            inp.value = '';
            setTimeout(() => {
                const r = curLang === 'EN' ? "Analyzing: " : "Анализ: ";
                container.innerHTML += <div class="bubble ai">${r} "${txt}"... Protocol BS-1.</div>;
                container.scrollTop = container.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
