<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | Terminal v12</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --text: #fff; --panel: #0a0a0a; --border: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* CSS-ЗАСТАВКА (СКРЫВАЕТСЯ САМА БЕЗ СКРИПТОВ) */
        #splash {
            position: fixed; inset: 0; z-index: 99999;
            background: #000; display: flex; align-items: center; justify-content: center;
            animation: hideSplash 0.5s forwards;
            animation-delay: 3s; /* Исчезнет ровно через 3 секунды */
            pointer-events: none;
        }
        @keyframes hideSplash {
            to { opacity: 0; visibility: hidden; }
        }
        .logo-txt { font-size: 40px; font-weight: bold; letter-spacing: 15px; color: #fff; text-shadow: 0 0 10px #fff; }

        /* ЭКРАНЫ */
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 40px 20px; }
        .active-screen { display: flex; }

        .lang-node { position: absolute; top: 30px; right: 20px; color: var(--gold); border: 1px solid var(--gold); padding: 5px 12px; cursor: pointer; font-size: 12px; }

        .form-ui { width: 100%; max-width: 320px; margin-top: 60px; display: flex; flex-direction: column; gap: 15px; }
        input { background: #050505; border: 1px solid var(--border); padding: 18px; color: #fff; outline: none; border-radius: 0; font-size: 14px; }
        input:focus { border-color: var(--gold); }
        .btn-entry { background: var(--gold); color: #000; border: none; padding: 20px; font-weight: bold; cursor: pointer; letter-spacing: 2px; }

        /* ГЛАВНАЯ КОНСОЛЬ */
        #main { display: none; height: 100vh; flex-direction: column; }
        header { height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }

        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .chat-log { display: flex; flex-direction: column; gap: 12px; }
        .line { padding: 10px; border: 1px solid var(--border); font-size: 13px; max-width: 90%; word-break: break-all; }
        .line.bot { border-left: 4px solid var(--gold); background: #050505; }
        .line.me { align-self: flex-end; background: #111; color: var(--gold); }

        /* ФУТЕР */
        footer { height: 90px; padding-bottom: 25px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); background: #000; }
        .nav-link { color: #444; font-size: 13px; font-weight: bold; text-decoration: none; cursor: pointer; text-transform: uppercase; }
        .nav-link.on { color: var(--gold); border-bottom: 1px solid var(--gold); }

        .input-bar { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        .input-bar input { flex: 1; padding: 10px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-txt">BSMLH</div>
    </div>

    <div id="scr-auth" class="screen active-screen">
        <div class="lang-node" onclick="setL()">LANG: <span id="cur-l">EN</span></div>
        <h2 id="t-head" style="margin-top:40px; letter-spacing:2px;">[ AUTH_REQUIRED ]</h2>
        <div class="form-ui">
            <input type="text" id="i1" placeholder="NAME">
            <input type="text" id="i2" placeholder="SURNAME">
            <input type="tel" id="i3" placeholder="PHONE">
            <button class="btn-entry" id="t-btn" onclick="openApp()">EXECUTE</button>
        </div>
    </div>

    <div id="main">
        <header>
            <div style="color:var(--gold)">MENU</div>
            <div style="letter-spacing:6px; font-weight:bold;">BSMLH</div>
            <div onclick="location.reload()">EXIT</div>
        </header>

        <div class="content">
            <div id="v-chat" class="chat-log">
                <div class="line bot" id="t-greet">SECURE_LINK: READY. AI_ASSISTANT: ONLINE.</div>
            </div>
            
            <div id="v-maps" style="display:none; text-align:center;">
                <div style="border:1px solid var(--border); padding:40px; background:#050505; color:var(--gold);">
                    [ GRID_MAP_ACTIVE ]<br><br>
                    LAT: 43.2389<br>
                    LON: 76.8897<br><br>
                    STATUS: ENCRYPTED
                </div>
            </div>
        </div>

        <div class="input-bar" id="bar">
            <input type="text" id="msg" placeholder=">_">
            <button onclick="send()" style="background:var(--gold); border:none; padding:0 15px; font-weight:bold;">></button>
        </div>

        <footer>
            <div class="nav-link on" id="n1" onclick="nav('chat')">CHAT</div>
            <div class="nav-link" id="n2" onclick="nav('maps')">MAPS</div>
            <div class="nav-link" id="n3">HUB</div>
            <div class="nav-link" id="n4" onclick="location.reload()">OFF</div>
        </footer>
    </div>

    <script>
        let L = 'EN';
        const D = {
            'EN': { h: "[ AUTH_REQUIRED ]", b: "EXECUTE", g: "SECURE_LINK: READY. AI_ASSISTANT: ONLINE.", p1: "NAME", p2: "SURNAME", p3: "PHONE" },
            'RU': { h: "[ ТРЕБУЕТСЯ ВХОД ]", b: "ЗАПУСК", g: "СВЯЗЬ УСТАНОВЛЕНА. ИИ ГОТОВ.", p1: "ИМЯ", p2: "ФАМИЛИЯ", p3: "ТЕЛЕФОН" }
        };

        function setL() {
            L = L === 'EN' ? 'RU' : 'EN';
            document.getElementById('cur-l').innerText = L;
            document.getElementById('t-head').innerText = D[L].h;
            document.getElementById('t-btn').innerText = D[L].b;
            document.getElementById('t-greet').innerText = D[L].g;
            document.getElementById('i1').placeholder = D[L].p1;
            document.getElementById('i2').placeholder = D[L].p2;
            document.getElementById('i3').placeholder = D[L].p3;
        }

        function openApp() {
            document.getElementById('scr-auth').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
        }

        function nav(mode) {
            document.getElementById('v-chat').style.display = (mode === 'chat' ? 'flex' : 'none');
            document.getElementById('bar').style.display = (mode === 'chat' ? 'flex' : 'none');
            document.getElementById('v-maps').style.display = (mode === 'maps' ? 'block' : 'none');
            document.getElementById('n1').className = 'nav-link' + (mode === 'chat' ? ' on' : '');
            document.getElementById('n2').className = 'nav-link' + (mode === 'maps' ? ' on' : '');
        }

        function send() {
            const i = document.getElementById('msg');
            if(!i.value) return;
            const log = document.getElementById('v-chat');
            log.innerHTML += <div class="line me">> ${i.value}</div>;
            const val = i.value;
            i.value = '';
            setTimeout(() => {
                const res = L === 'EN' ? "DATA_RECEIVED: " : "ДАННЫЕ ПОЛУЧЕНЫ: ";
                log.innerHTML += <div class="line bot">${res} ${val.toUpperCase()} [OK]</div>;
                log.parentElement.scrollTop = log.parentElement.scrollHeight;
            }, 400);
        }
    </script>
</body>
</html>
