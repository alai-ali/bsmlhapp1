[17:18, 03.03.2026] Ali: <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSMLH v20</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        
        /* Стили кнопок и инпутов */
        .box { border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; background: #0a0a0a; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: #f6851b; border: none; color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        
        /* Языки */
        .langs { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .l-btn { padding: 10px; border: 1px solid #444; border-radius: 5px; font-size: 12px; color: #888; }
        .l-btn.on { border-color: #f6851b; color: #f6851b; }

        /* История (Sidebar упрощенный) */
        .history { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        .h-item { padding: 10px; color: #666; border-bottom: 1px solid #111; }

        /* Контент приложения */
        #app-content { display: none; }
    </style>
</head>
<body>

    <div id="reg-screen">
        <div class="langs">
            <div class="l-btn on" onclick="setL('RU')">RU</div>
            <div class="l-btn" onclick="setL('EN')">EN</div>
            <div class="l-btn" onclick="setL('AR')">AR</div>
            <div class="l-btn" onclick="setL('CH')">CH</div>
        </div>
        
        <div class="box">
            <h2 id="h-title">РЕГИСТРАЦИЯ</h2>
            <input type="text" id="fname" placeholder="ИМЯ">
            <input type="text" id="lname" placeholder="ФАМИЛИЯ">
            <input type="tel" id="phone" placeholder="ТЕЛЕФОН">
            <button class="btn" id="h-btn" onclick="openApp()">ВОЙТИ</button>
        </div>
    </div>

    <div id="app-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div onclick="toggleHist()" style="color: #f6851b; font-size: 24px;">☰</div>
            <div style="letter-spacing: 3px; font-weight: bold;">BSMLH</div>
            <div onclick="location.reload()">Выход</div>
        </div>

        <div id="history-box" class="history">
            <div class="h-item">История: Alex</div>
            <div class="h-item">История: Maria</div>
            <div class="h-item">История: Ahmed</div>
            <div class="h-item">История: Li Wei</div>
        </div>

        <div class="box" id="chat-box">
            <div id="messages" style="min-height: 100px; font-size: 14px; color: #ccc;">
                СИСТЕМА: ОНЛАЙН.
            </div>
        </div>

        <input type="text" id="user-msg" placeholder="Сообщение...">
        <button class="btn" onclick="sendMsg()">ОТПРАВИТЬ</button>
    </div>

    <script>
        const texts = {
            'RU': { h: "РЕГИСТРАЦИЯ", b: "ВОЙТИ" },
            'EN': { h: "REGISTRATION", b: "LOGIN" },
            'AR': { h: "تسجيل", b: "دخول" },
            'CH': { h: "注册", b: "登录" }
        };

        function setL(l) {
            document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('on'));
            event.target.classList.add('on');
            document.getElementById('h-title').innerText = texts[l].h;
            document.getElementById('h-btn').innerText = texts[l].b;
        }

        function openApp() {
            const name = document.getElementById('fname').value;
            if(!name) return alert("Введите имя");
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        }

        function toggleHist() {
            const h = document.getElementById('history-box');
            h.style.display = (h.style.display === 'block' ? 'none' : 'block');
        }

        function sendMsg() {
            const m = document.getElementById('user-msg');
            if(!m.value) return;
            const box = document.getElementById('messages');
            box.innerHTML += <div style="color:#f6851b; margin-top:10px;">Вы: ${m.value}</div>;
            m.value = '';
            setTimeout(() => {
                box.innerHTML += <div style="color:#888; margin-top:5px;">ИИ: Анализ завершен.</div>;
            }, 500);
        }
    </script>
</body>
</html>
