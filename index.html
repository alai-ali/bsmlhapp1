<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | Defense System</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --text: #ffffff;
            --bg-dark: #0a0a0b;
            --panel: #121214;
            --border: rgba(255,255,255,0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* СПЛЕШ-СКРИН: СТАТИЧНЫЙ И МОЩНЫЙ */
        #splash {
            position: fixed; inset: 0; z-index: 9999;
            background: #050505;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }

        .logo-static {
            font-size: 50px; font-weight: 700; letter-spacing: 20px; color: #fff;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.2; text-shadow: 0 0 0px #fff; }
            50% { opacity: 1; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
        }

        /* РЕГИСТРАЦИЯ */
        .screen { position: fixed; inset: 0; padding: 40px 25px; display: none; flex-direction: column; align-items: center; background: var(--bg-dark); }
        .active-screen { display: flex; }

        .lang-zone { position: absolute; top: 40px; right: 25px; cursor: pointer; color: var(--gold); font-size: 20px; z-index: 100; }
        
        .form-ui { width: 100%; max-width: 360px; margin-top: 80px; display: flex; flex-direction: column; gap: 12px; }
        input { 
            background: var(--panel); border: 1px solid var(--border);
            padding: 20px; border-radius: 12px; color: #fff; outline: none; font-size: 16px;
        }

        .btn-core {
            background: var(--gold); color: #000; border: none; padding: 20px;
            border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* ГЛАВНЫЙ ИНТЕРФЕЙС */
        #app-shell { display: none; height: 100vh; flex-direction: column; }
        header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }

        /* КАРТА БУДУЩЕГО */
        .future-map {
            width: 100%; height: 250px; background: #000; border-radius: 20px;
            border: 1px solid #1a3a3a; position: relative; overflow: hidden;
            background-image: radial-gradient(#1a3a3a 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .radar-line {
            width: 100%; height: 2px; background: rgba(0, 255, 255, 0.2);
            position: absolute; animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        /* ЧАТ */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .msg.ai { background: var(--panel); align-self: flex-start; border: 1px solid var(--border); }
        .msg.user { background: var(--gold); color: #000; align-self: flex-end; }

        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; margin: 0; }

        /* ФУТЕР (ПОДНЯТЫЙ) */
        footer { 
            height: 90px; padding-bottom: 25px; 
            display: flex; justify-content: space-around; align-items: center;
            background: #050505; border-top: 1px solid var(--border);
        }
        .nav-tab { color: #444; font-size: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-tab.active { color: var(--gold); }
        .nav-tab i { font-size: 24px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-static">BSMLH</div>
        <p style="font-size: 8px; color: #333; letter-spacing: 4px; margin-top: 20px;">SECURITY PROTOCOL ACTIVE</p>
    </div>

    <div id="scr-auth" class="screen active-screen">
        <div class="lang-zone" onclick="toggleLang()">🌐 <span id="cur-lang">EN</span></div>
        <h1 id="h-welcome" style="font-weight: 300; margin-top: 40px;">Welcome</h1>
        <div class="form-ui">
            <input type="text" id="fn" placeholder="First Name">
            <input type="text" id="ln" placeholder="Last Name">
            <input type="tel" id="ph" placeholder="Phone Number">
            <button class="btn-core" id="b-next" onclick="toApp()">CONTINUE</button>
        </div>
    </div>

    <div id="app-shell">
        <header>
            <div style="color: var(--gold); font-size: 20px;">☰</div>
            <div style="letter-spacing: 3px; font-weight: bold; font-size: 14px;">BSMLH</div>
            <div style="font-size: 20px;">⋮</div>
        </header>

        <main style="flex: 1; display: flex; flex-direction: column;">
            <div id="tab-chat" class="tab-content chat-area">
                <div class="msg ai" id="ai-greet">Hello! I am your AI assistant. How can I help you today?</div>
            </div>
            <div class="input-area" id="chat-input-box">
                <input type="text" id="user-msg" placeholder="Message...">
                <button onclick="sendMsg()" style="background:none; border:none; color:var(--gold); font-size:20px;">▲</button>
            </div>

            <div id="tab-maps" class="tab-content" style="display:none; padding:20px;">
                <div class="future-map">
                    <div class="radar-line"></div>
                    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--gold); font-size:12px; letter-spacing:2px;">SCANNING...</div>
                </div>
                <h3 id="h-maps" style="margin-top:20px; font-weight:300;">Digital Map</h3>
            </div>

            <div id="tab-profile" class="tab-content" style="display:none; padding:20px;">
                <div style="background:var(--panel); padding:20px; border-radius:15px; border:1px solid var(--border);">
                    <h2 id="u-name">User Name</h2>
                    <p style="font-size:12px; color:#555; margin-top:5px;">ID: BS-992301</p>
                </div>
                <button class="btn-core" style="background:#221111; color:red; width:100%; margin-top:20px;" onclick="logout()">LOGOUT</button>
            </div>
        </main>

        <footer>
            <div class="nav-tab active" onclick="switchTab('chat', this)"><i>💬</i><span id="n-chat">CHAT</span></div>
            <div class="nav-tab" onclick="switchTab('maps', this)"><i>📡</i><span id="n-maps">MAPS</span></div>
            <div class="nav-tab" onclick="switchTab('hub', this)"><i>🚀</i>HUB</div>
            <div class="nav-tab" onclick="switchTab('profile', this)"><i>👤</i><span id="n-prof">PROFILE</span></div>
        </footer>
    </div>

    <script>
        let currentLang = 'EN';
        const langData = {
            'EN': { welcome: "Welcome", next: "CONTINUE", chat: "CHAT", maps: "MAPS", prof: "PROFILE", greet: "Hello! I am your AI assistant.", phName: "First Name", phLast: "Last Name", phPhone: "Phone Number" },
            'RU': { welcome: "Добро пожаловать", next: "ДАЛЕЕ", chat: "ЧАТ", maps: "КАРТЫ", prof: "ПРОФИЛЬ", greet: "Привет! Я ваш ИИ-ассистент.", phName: "Имя", phLast: "Фамилия", phPhone: "Номер телефона" }
        };

        // Splash screen
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 1000);
        }, 3000);

        function toggleLang() {
            currentLang = currentLang === 'EN' ? 'RU' : 'EN';
            document.getElementById('cur-lang').innerText = currentLang;
            updateLangUI();
        }

        function updateLangUI() {
            const d = langData[currentLang];
            document.getElementById('h-welcome').innerText = d.welcome;
            document.getElementById('b-next').innerText = d.next;
            document.getElementById('n-chat').innerText = d.chat;
            document.getElementById('n-maps').innerText = d.maps;
            document.getElementById('n-prof').innerText = d.prof;
            document.getElementById('ai-greet').innerText = d.greet;
            document.getElementById('fn').placeholder = d.phName;
            document.getElementById('ln').placeholder = d.phLast;
            document.getElementById('ph').placeholder = d.phPhone;
        }

        function toApp() {
            document.getElementById('scr-auth').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            document.getElementById('u-name').innerText = document.getElementById('fn').value + " " + document.getElementById('ln').value;
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = (tab === 'chat') ? 'flex' : 'block';
            document.getElementById('chat-input-box').style.display = (tab === 'chat') ? 'flex' : 'none';
            el.classList.add('active');
        }

        function sendMsg() {
            const input = document.getElementById('user-msg');
            if(!input.value) return;
            
            const area = document.getElementById('tab-chat');
            area.innerHTML += <div class="msg user">${input.value}</div>;
            
            setTimeout(() => {
                const reply = currentLang === 'EN' ? "Processing your request..." : "Обрабатываю ваш запрос...";
                area.innerHTML += <div class="msg ai">${reply}</div>;
                area.scrollTop = area.scrollHeight;
            }, 1000);
            
            input.value = '';
            area.scrollTop = area.scrollHeight;
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
