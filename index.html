<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | Defense System</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --bg: #050505;
            --panel: #111112;
            --text: #ffffff;
            --border: rgba(255,255,255,0.05);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* ИСПРАВЛЕННАЯ ЗАСТАВКА */
        #splash {
            position: fixed; inset: 0; z-index: 10000;
            background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .logo-static {
            font-size: clamp(40px, 10vw, 60px); 
            font-weight: 800; 
            letter-spacing: 15px; 
            color: #fff;
            animation: pulse-glow 2.5s ease-in-out infinite;
            text-align: center;
            margin-left: 15px; /* Компенсация letter-spacing для центровки */
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.1; text-shadow: 0 0 0px #fff; }
            50% { opacity: 1; text-shadow: 0 0 30px rgba(255,255,255,0.5); }
        }

        /* ЭКРАНЫ */
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 40px 25px; }
        .active-screen { display: flex; }

        .lang-trigger { position: absolute; top: 40px; right: 25px; color: var(--gold); font-weight: bold; cursor: pointer; z-index: 1100; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }

        .form-container { width: 100%; max-width: 360px; margin-top: 60px; display: flex; flex-direction: column; gap: 15px; }
        input { 
            background: var(--panel); border: 1px solid var(--border);
            padding: 20px; border-radius: 14px; color: #fff; outline: none; font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); }

        .btn-action {
            background: var(--gold); color: #000; border: none; padding: 22px;
            border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        /* КОНСОЛЬ */
        #console { display: none; height: 100vh; flex-direction: column; }
        header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }

        /* КАРТА БУДУЩЕГО (RADAR) */
        .radar-view {
            width: 100%; height: 280px; background: #000; border-radius: 20px;
            border: 1px solid #1a1a1a; position: relative; overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,255,255,0.05);
        }
        .radar-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 1px solid rgba(0, 255, 255, 0.1); border-radius: 50%;
        }
        .scan-bar {
            width: 100%; height: 50%; background: linear-gradient(to bottom, transparent, rgba(212, 175, 55, 0.1));
            position: absolute; top: -50%; animation: scan-v 4s linear infinite;
        }
        @keyframes scan-v { 0% { top: -50%; } 100% { top: 100%; } }

        /* ЧАТ */
        .chat-wrap { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 14px 18px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .bubble.ai { background: var(--panel); border: 1px solid var(--border); align-self: flex-start; }
        .bubble.user { background: var(--gold); color: #000; align-self: flex-end; font-weight: 500; }

        /* НИЖНЯЯ ПАНЕЛЬ */
        footer { 
            height: 95px; padding-bottom: 25px; 
            display: flex; justify-content: space-around; align-items: center;
            background: #000; border-top: 1px solid var(--border);
        }
        .tab-btn { color: #333; font-size: 10px; text-align: center; cursor: pointer; }
        .tab-btn.active { color: var(--gold); }
        .tab-btn i { font-size: 26px; display: block; margin-bottom: 5px; }

        .input-bar { padding: 15px 20px; display: flex; gap: 10px; background: #000; border-top: 1px solid var(--border); }
        .input-bar input { flex: 1; padding: 12px; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-static">BSMLH</div>
        <div style="font-size: 9px; color: #444; letter-spacing: 5px; margin-top: 30px; text-transform: uppercase;">
            Fortress Protocol Loading...
        </div>
    </div>

    <div id="scr-auth" class="screen active-screen">
        <div class="lang-trigger" onclick="toggleLanguage()">🌐 <span id="lang-label">EN</span></div>
        <h1 id="txt-welcome" style="font-weight: 200; margin-top: 60px; letter-spacing: 2px;">Welcome</h1>
        <div class="form-container">
            <input type="text" id="fn" placeholder="First Name">
            <input type="text" id="ln" placeholder="Last Name">
            <input type="tel" id="ph" placeholder="Phone Number">
            <button class="btn-action" id="txt-btn" onclick="goToApp()">Continue</button>
        </div>
    </div>

    <div id="console">
        <header>
            <div style="color: var(--gold); font-size: 20px;">☰</div>
            <div style="letter-spacing: 4px; font-weight: 900; font-size: 14px;">BSMLH</div>
            <div style="font-size: 20px;">⋮</div>
        </header>

        <main style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <div id="tab-chat" class="tab-view chat-wrap">
                <div class="bubble ai" id="txt-greet">System initialized. AI Assistant online. How can I help?</div>
            </div>
            <div class="input-bar" id="chat-input-area">
                <input type="text" id="msg-val" placeholder="...">
                <button onclick="send()" style="background:none; border:none; color:var(--gold); font-size:24px;">▲</button>
            </div>

            <div id="tab-maps" class="tab-view" style="display:none; padding:20px;">
                <div class="radar-view">
                    <div class="scan-bar"></div>
                    <div class="radar-circle" style="width:100px; height:100px;"></div>
                    <div class="radar-circle" style="width:200px; height:200px;"></div>
                    <div style="position:absolute; bottom:20px; width:100%; text-align:center; color:var(--gold); font-size:10px; letter-spacing:3px;">SATELLITE LINK ACTIVE</div>
                </div>
                <h2 id="txt-map-h" style="margin-top:25px; font-weight:300;">Global Ledger Map</h2>
            </div>
        </main>

        <footer>
            <div class="tab-btn active" onclick="nav('chat', this)"><i>💬</i><span id="n-chat">CHAT</span></div>
            <div class="tab-btn" onclick="nav('maps', this)"><i>📡</i><span id="n-maps">MAPS</span></div>
            <div class="tab-btn"><i>🚀</i>HUB</div>
            <div class="tab-btn" onclick="logout()"><i>👤</i>OFF</div>
        </footer>
    </div>

    <script>
        let lang = 'EN';
        const dictionary = {
            'EN': { welcome: "Welcome", btn: "Continue", chat: "CHAT", maps: "MAPS", greet: "System initialized. AI Assistant online.", maph: "Global Ledger Map", ph1: "First Name", ph2: "Last Name", ph3: "Phone Number" },
            'RU': { welcome: "Добро пожаловать", btn: "Далее", chat: "ЧАТ", maps: "КАРТЫ", greet: "Система инициализирована. ИИ на связи.", maph: "Карта глобального реестра", ph1: "Имя", ph2: "Фамилия", ph3: "Номер телефона" }
        };

        // ГАРАНТИРОВАННОЕ УДАЛЕНИЕ ЗАСТАВКИ
        window.addEventListener('load', () => {
            setTimeout(() => {
                const s = document.getElementById('splash');
                s.style.opacity = '0';
                setTimeout(() => { s.style.display = 'none'; }, 800);
            }, 3000); 
        });

        function toggleLanguage() {
            lang = lang === 'EN' ? 'RU' : 'EN';
            document.getElementById('lang-label').innerText = lang;
            const d = dictionary[lang];
            document.getElementById('txt-welcome').innerText = d.welcome;
            document.getElementById('txt-btn').innerText = d.btn;
            document.getElementById('n-chat').innerText = d.chat;
            document.getElementById('n-maps').innerText = d.maps;
            document.getElementById('txt-greet').innerText = d.greet;
            document.getElementById('txt-map-h').innerText = d.maph;
            document.getElementById('fn').placeholder = d.ph1;
            document.getElementById('ln').placeholder = d.ph2;
            document.getElementById('ph').placeholder = d.ph3;
        }

        function goToApp() {
            document.getElementById('scr-auth').style.display = 'none';
            document.getElementById('console').style.display = 'flex';
        }

        function nav(t, el) {
            document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).style.display = (t === 'chat' ? 'flex' : 'block');
            document.getElementById('chat-input-area').style.display = (t === 'chat' ? 'flex' : 'none');
            el.classList.add('active');
        }

        function send() {
            const i = document.getElementById('msg-val');
            if(!i.value) return;
            const wrap = document.getElementById('tab-chat');
            wrap.innerHTML += <div class="bubble user">${i.value}</div>;
            const val = i.value;
            i.value = '';
            setTimeout(() => {
                const resp = lang === 'EN' ? "Analyzing data for: " : "Анализирую данные для: ";
                wrap.innerHTML += <div class="bubble ai">${resp} "${val}"...</div>;
                wrap.scrollTop = wrap.scrollHeight;
            }, 800);
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
