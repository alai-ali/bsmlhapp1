<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | Premium Edition</title>
    <style>
        :root { 
            --gold: #d4af37; /* Платиновое золото */
            --text: #ffffff;
            --border: rgba(255,255,255,0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        /* АНИМИРОВАННЫЙ ПЕРЕЛИВАЮЩИЙСЯ ФОН */
        body { 
            background: linear-gradient(135deg, #050505, #1a1a1a, #0a0a0a, #1f1f1f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ЗАСТАВКА С ГОРЯЩИМИ БУКВАМИ */
        #splash {
            position: fixed; inset: 0; z-index: 9999;
            background: inherit;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s ease;
        }

        .breathing-text {
            font-size: 40px; font-weight: 200; letter-spacing: 15px; color: #fff;
            animation: breathe 3s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); text-shadow: 0 0 30px rgba(255,255,255,0.6); }
        }

        /* ИНТЕРФЕЙС РЕГИСТРАЦИИ */
        .screen { position: fixed; inset: 0; padding: 40px 30px; display: none; flex-direction: column; align-items: center; }
        .active-screen { display: flex; }

        .lang-select { position: absolute; top: 50px; right: 30px; z-index: 1100; }
        #lang-dropdown { 
            display: none; position: absolute; right: 0; top: 35px; 
            background: rgba(20,20,20,0.95); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; width: 120px;
        }
        .lang-opt { padding: 12px; font-size: 14px; border-bottom: 1px solid var(--border); cursor: pointer; }

        .input-group { width: 100%; max-width: 360px; margin-top: 60px; display: flex; flex-direction: column; gap: 15px; }
        input { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 20px; border-radius: 16px; color: #fff; outline: none;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }

        .btn-premium {
            background: var(--gold); color: #000; border: none; padding: 22px;
            border-radius: 18px; font-weight: bold; letter-spacing: 1px;
            cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        /* НИЖНЯЯ ПАНЕЛЬ (ПОВЫШЕННАЯ) */
        footer { 
            height: 100px; /* Увеличили высоту */
            padding-bottom: 30px; /* Подняли иконки от края */
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #555; font-size: 11px; font-weight: 500; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 26px; }

        /* PROFILE STYLE */
        .profile-card {
            width: 100%; padding: 25px; background: rgba(255,255,255,0.03);
            border-radius: 24px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 20px; margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="breathing-text">BSMLH</div>
        <div style="font-size: 7px; color: #444; letter-spacing: 3px; margin-top: 10px; text-align: center;">
            BIOMETRIC SECURITY MULTI-FUNCTION LEDGER FOR HUMANITY
        </div>
    </div>

    <div id="scr-reg" class="screen">
        <div class="lang-select">
            <span onclick="toggleLangMenu()" style="font-size: 24px; cursor: pointer;">🌐</span>
            <div id="lang-dropdown">
                <div class="lang-opt" onclick="changeLang('ru')">Русский</div>
                <div class="lang-opt" onclick="changeLang('en')">English</div>
            </div>
        </div>
        
        <h2 id="t-welcome" style="margin-top: 50px; font-weight: 300;">Welcome</h2>
        
        <div class="input-group">
            <input type="text" id="fn" placeholder="First Name">
            <input type="text" id="ln" placeholder="Last Name">
            <input type="tel" id="ph" placeholder="Phone Number">
            <button class="btn-premium" id="btn-next" onclick="toSms()">CONTINUE</button>
        </div>
    </div>

    <div id="scr-sms" class="screen">
        <h2 id="t-sms" style="margin-top: 50px;">Verification</h2>
        <div class="input-group">
            <input type="text" id="sms-code" placeholder="Enter 1234" style="text-align: center; letter-spacing: 10px; font-size: 24px;">
            <button class="btn-premium" onclick="verifySms()">VERIFY</button>
        </div>
    </div>

    <div id="main-app" style="display: none; height: 100vh; flex-direction: column;">
        <header style="height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-bottom: 1px solid var(--border);">
            <div style="color: var(--gold); font-size: 22px;">☰</div>
            <div style="font-weight: bold; letter-spacing: 2px;">BSMLH</div>
            <div style="font-size: 22px;">⋮</div>
        </header>

        <main style="flex: 1; padding: 25px;">
            <div id="tab-chat" class="tab-content active-tab">
                <p style="color: #444;">No active messages</p>
            </div>
            
            <div id="tab-profile" class="tab-content" style="display: none;">
                <div class="profile-card">
                    <div style="width: 60px; height: 60px; background: #222; border-radius: 15px; border: 1px solid var(--gold);"></div>
                    <div>
                        <h3 id="p-full-name">User Name</h3>
                        <p style="font-size: 11px; color: #555;">HUID-PENDING</p>
                    </div>
                </div>
                <button class="btn-premium" style="background: #331111; color: #ff4444; width: 100%;" onclick="logout()">LOGOUT</button>
            </div>
        </main>

        <footer>
            <div class="nav-item active" onclick="showTab('chat', this)"><i>💬</i>CHAT</div>
            <div class="nav-item" onclick="showTab('maps', this)"><i>🗺️</i>MAPS</div>
            <div class="nav-item" onclick="showTab('hub', this)"><i>🚀</i>HUB</div>
            <div class="nav-item" onclick="showTab('profile', this)"><i>👤</i>PROFILE</div>
        </footer>
    </div>

    <script>
        // Splash Screen Logic
        setTimeout(() => {
            const s = document.getElementById('splash');
            s.style.opacity = '0';
            setTimeout(() => { s.style.display = 'none'; checkSession(); }, 1500);
        }, 4000);

        function toggleLangMenu() {
            const d = document.getElementById('lang-dropdown');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }

        function changeLang(l) {
            const t = {
                ru: { welcome: "Добро пожаловать", fn: "Имя", ln: "Фамилия", ph: "Телефон", next: "ДАЛЕЕ", sms: "Код подтверждения" },
                en: { welcome: "Welcome", fn: "First Name", ln: "Last Name", ph: "Phone Number", next: "CONTINUE", sms: "Verification" }
            };
            document.getElementById('t-welcome').innerText = t[l].welcome;
            document.getElementById('fn').placeholder = t[l].fn;
            document.getElementById('ln').placeholder = t[l].ln;
            document.getElementById('ph').placeholder = t[l].ph;
            document.getElementById('btn-next').innerText = t[l].next;
            document.getElementById('t-sms').innerText = t[l].sms;
            toggleLangMenu();
        }

        function checkSession() {
            if(localStorage.getItem('auth')) { showApp(); } 
            else { document.getElementById('scr-reg').classList.add('active-screen'); }
        }

        function toSms() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('scr-sms').classList.add('active-screen');
        }

        function verifySms() {
            if(document.getElementById('sms-code').value === '1234') {
                localStorage.setItem('auth', 'true');
                localStorage.setItem('name', document.getElementById('fn').value + ' ' + document.getElementById('ln').value);
                showApp();
            }
        }

        function showApp() {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('p-full-name').innerText = localStorage.getItem('name') || "User";
        }

        function showTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            el.classList.add('active');
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
