<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH STABLE v7.1</title>
    <style>
        :root { --gold: #f6851b; --blue: #007aff; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, Helvetica, sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* SPLASH */
        #splash { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeOut 0.4s forwards 2s; pointer-events: none; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        .s-title { font-size: 45px; font-weight: 900; letter-spacing: 10px; }
        .s-sub { font-size: 9px; margin-top: 10px; text-align: center; max-width: 280px; line-height: 1.4; }

        /* SCREENS */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; padding: 20px; background: #000; z-index: 10; }
        .active { display: flex; }

        /* GLOBE */
        .top-nav { width: 100%; display: flex; justify-content: flex-end; padding: 10px; }
        .g-btn { font-size: 28px; color: var(--blue); cursor: pointer; padding: 5px; }
        #l-box { display: none; position: absolute; top: 60px; right: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; z-index: 100; overflow: hidden; }
        .l-opt { padding: 12px 25px; border-bottom: 1px solid #222; font-size: 14px; text-align: center; }

        /* INPUTS & BUTTONS */
        .inp { width: 100%; max-width: 300px; padding: 16px; margin: 15px 0; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; outline: none; }
        .btn { width: 100%; max-width: 300px; padding: 18px; border-radius: 12px; border: none; background: var(--gold); color: #000; font-weight: bold; font-size: 15px; cursor: pointer; }
        .skip { margin-top: 20px; color: #666; font-size: 13px; text-decoration: underline; }

        /* MEDIA */
        #v-feed { width: 260px; height: 260px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; background: #111; transform: scaleX(-1); }

        /* MAIN APP */
        #app { display: none; height: 100vh; flex-direction: column; background: #ededed; color: #000; position: absolute; inset: 0; z-index: 50; }
        header { background: #1a1a1a; color: #fff; height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; letter-spacing: 2px; }
        .scroll-area { flex: 1; overflow-y: auto; }
        
        .c-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #ddd; background: #fff; }
        .c-av { width: 48px; height: 48px; background: #eee; border-radius: 8px; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        .p-box { background: #fff; padding: 25px 20px; display: flex; align-items: center; margin-bottom: 10px; }
        #p-img { width: 64px; height: 64px; border-radius: 8px; background: #eee; object-fit: cover; margin-right: 15px; }

        footer { display: flex; justify-content: space-around; padding: 15px 0 35px; background: #f7f7f7; border-top: 1px solid #ccc; }
        .n-tab { color: #999; font-size: 11px; font-weight: bold; text-align: center; }
        .n-tab.on { color: #07c160; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="s-title">BSMLH</div>
        <div class="s-sub">BIOMETRIC SECURITY MULTIFUNCTION LEDGER FOR HUMANITY</div>
    </div>

    <div id="scr-1" class="screen active">
        <div class="top-nav"><div class="g-btn" onclick="openL()">🌐</div></div>
        <div id="l-box">
            <div class="l-opt" onclick="setL('RU')">Русский</div>
            <div class="l-opt" onclick="setL('EN')">English</div>
            <div class="l-opt" onclick="setL('AR')">العربية</div>
            <div class="l-opt" onclick="setL('CH')">中文</div>
        </div>
        <h2 id="t-reg" style="margin-top: 60px;">РЕГИСТРАЦИЯ</h2>
        <input type="text" id="u-name" placeholder="ИМЯ" class="inp">
        <button id="b-1" class="btn" onclick="toScan()">ДАЛЕЕ</button>
    </div>

    <div id="scr-2" class="screen">
        <video id="v-feed" autoplay playsinline></video>
        <button id="b-2" class="btn" style="margin-top: 30px;" onclick="doPhoto()">СДЕЛАТЬ ФОТО</button>
    </div>

    <div id="scr-3" class="screen">
        <h3 id="t-chip" style="margin-top: 50px;">ОЖИДАНИЕ ЧИПА...</h3>
        <div style="font-size: 90px; margin: 40px;">💍</div>
        <button id="b-3" class="btn" onclick="toApp()">ПОДТВЕРДИТЬ</button>
        <div class="skip" onclick="toApp()">ВОЙТИ БЕЗ ЧИПА</div>
    </div>

    <div id="app">
        <header>BSMLH</header>
        <div class="scroll-area">
            <div id="v-chat"></div>
            <div id="v-prof" style="display:none;">
                <div class="p-box">
                    <img id="p-img" src="">
                    <div><h3 id="disp-name">User</h3><p style="color:#888; font-size:13px;">ID: 77801-BS</p></div>
                </div>
                <div style="background:#fff; padding:15px 20px; border-bottom:1px solid #eee;">Services</div>
            </div>
        </div>
        <footer>
            <div class="n-tab on" id="tab-c" onclick="show('chat')">CHAT</div>
            <div class="n-tab" id="tab-p" onclick="show('prof')">PROFILE</div>
        </footer>
    </div>

    <canvas id="c-hidden" style="display:none;"></canvas>

    <script>
        const dic = {
            'RU': {r:"РЕГИСТРАЦИЯ", n:"ДАЛЕЕ", c:"ОЖИДАНИЕ ЧИПА...", f:"ПОДТВЕРДИТЬ"},
            'EN': {r:"REGISTRATION", n:"NEXT", c:"WAITING FOR CHIP...", f:"CONFIRM"},
            'AR': {r:"تسجيل", n:"التالي", c:"انتظار الشريحة...", f:"تأكيد"},
            'CH': {r:"注册", n:"下一步", c:"等待芯片...", f:"确认"}
        };

        function openL() { const b = document.getElementById('l-box'); b.style.display = b.style.display === 'block' ? 'none' : 'block'; }
        
        function setL(l) {
            document.getElementById('t-reg').innerText = dic[l].r;
            document.getElementById('b-1').innerText = dic[l].n;
            document.getElementById('t-chip').innerText = dic[l].c;
            document.getElementById('b-3').innerText = dic[l].f;
            openL();
        }

        async function toScan() {
            if(!document.getElementById('u-name').value) return;
            document.getElementById('scr-1').style.display = 'none';
            document.getElementById('scr-2').style.display = 'flex';
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
            document.getElementById('v-feed').srcObject = s;
        }

        function doPhoto() {
            const v = document.getElementById('v-feed');
            const can = document.getElementById('c-hidden');
            can.width = v.videoWidth; can.height = v.videoHeight;
            can.getContext('2d').drawImage(v, 0, 0);
            document.getElementById('p-img').src = can.toDataURL('image/png');
            v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('scr-2').style.display = 'none';
            document.getElementById('scr-3').style.display = 'flex';
        }

        function toApp() {
            document.getElementById('disp-name').innerText = document.getElementById('u-name').value;
            document.getElementById('scr-3').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            const chat = document.getElementById('v-chat');
            chat.innerHTML = ["Alex", "Sarah", "Ahmed", "Li", "Maria", "Ivan", "Fatima", "Chen", "John", "Elena"]
                .map(n => <div class="c-item"><div class="c-av">👤</div><div><h4>${n}</h4><p style="color:#999;font-size:12px;">Secure...</p></div></div>).join('');
        }

        function show(t) {
            document.getElementById('v-chat').style.display = t === 'chat' ? 'block' : 'none';
            document.getElementById('v-prof').style.display = t === 'prof' ? 'block' : 'none';
            document.getElementById('tab-c').className = 'n-tab' + (t==='chat'?' on':'');
            document.getElementById('tab-p').className = 'n-tab' + (t==='prof'?' on':'');
        }
    </script>
</body>
</html>
