<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH | Security Terminal v14</title>
    <style>
        :root { 
            --gold: #f6851b; 
            --bg: #0a0a0b; 
            --input-bg: #161618;
            --text: #ffffff;
            --border: #2d2d2d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* SPLASH - ПРИНУДИТЕЛЬНОЕ СКРЫТИЕ */
        #splash {
            position: fixed; inset: 0; z-index: 10000;
            background: #000; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .splash-logo { font-size: 45px; font-weight: 900; letter-spacing: 12px; color: #fff; }

        /* ЭКРАНЫ */
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 40px 20px; }
        .active-screen { display: flex; }

        .lang-node { position: absolute; top: 20px; right: 20px; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; font-weight: bold; cursor: pointer; z-index: 1001; }

        .f-box { width: 100%; max-width: 360px; margin-top: 50px; display: flex; flex-direction: column; gap: 15px; }
        
        /* ИСПРАВЛЕННЫЕ ИНПУТЫ (ВИДИМОСТЬ ТЕКСТА) */
        input { 
            background: var(--input-bg); border: 2px solid var(--border); 
            padding: 20px; color: #fff; border-radius: 12px; font-size: 16px; outline: none;
            width: 100%;
        }
        input:focus { border-color: var(--gold); background: #1a1a1c; }
        input::placeholder { color: #555; }

        .btn-main { 
            background: var(--gold); color: #000; border: none; padding: 22px; 
            border-radius: 12px; font-weight: 900; cursor: pointer; letter-spacing: 1px; 
            text-transform: uppercase; margin-top: 10px;
        }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        #app { display: none; height: 100vh; flex-direction: column; background: #000; }
        header { 
            height: 70px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; border-bottom: 1px solid var(--border);
        }

        main { flex: 1; overflow-y: auto; padding: 20px; position: relative; }
        
        /* ЧАТ */
        .chat-wrap { display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 15px; border-radius: 15px; font-size: 14px; max-width: 85%; border: 1px solid var(--border); line-height: 1.4; }
        .msg.ai { background: #111; border-left: 4px solid var(--gold); align-self: flex-start; }
        .msg.user { background: var(--gold); color: #000; align-self: flex-end; font-weight: bold; }

        /* ФУТЕР (ПОДНЯТ ДЛЯ МОБИЛЬНЫХ) */
        footer { 
            height: 90px; padding-bottom: 20px; 
            display: flex; justify-content: space-around; align-items: center;
            background: #080808; border-top: 1px solid var(--border);
        }
        .nav-link { color: #444; font-size: 11px; font-weight: 800; cursor: pointer; text-align: center; }
        .nav-link.active { color: var(--gold); }

        .input-bar { padding: 15px; display: flex; gap: 10px; background: #000; border-top: 1px solid var(--border); }
        .input-bar input { padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">BSMLH</div>
    </div>

    <div id="scr-reg" class="screen active-screen">
        <div class="lang-node" onclick="toggleL()">🌐 <span id="cur-l">RU</span></div>
        <h2 id="t-welcome" style="margin-top:40px; letter-spacing: 2px;">WELCOME</h2>
        <div class="f-box">
            <input type="text" id="fn" placeholder="ИМЯ (NAME)">
            <input type="text" id="ln" placeholder="ФАМИЛИЯ (SURNAME)">
            <input type="tel" id="ph" placeholder="ТЕЛЕФОН (PHONE)">
            <button class="btn-main" id="t-btn" onclick="openSys()">INITIALIZE</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="color:var(--gold); font-size:22px; font-weight:bold;">☰</div>
            <div style="font-weight:900; letter-spacing:4px; font-size:14px;">BSMLH</div>
            <div style="color:#333; font-size:22px;">⋮</div>
        </header>

        <main id="main-content">
            <div id="view-chat" class="chat-wrap">
                <div class="msg ai" id="t-greet">СИСТЕМА: ПОДКЛЮЧЕНО. ВВЕДИТЕ ЗАПРОС.</div>
            </div>
            
            <div id="view-maps" style="display:none; text-align:center; padding-top:40px;">
                <div style="border:1px solid var(--gold); padding:30px; color:var(--gold); font-family:monospace;">
                    [ GRID: ACTIVE ]<br><br>
                    SCANNING...<br><br>
                    SECURE_LEDGER_MAP
                </div>
            </div>
        </main>

        <div class="input-bar" id="chat-tools">
            <input type="text" id="min" placeholder=">_">
            <button onclick="send()" style="background:var(--gold); border:none; padding:0 20px; font-weight:900; border-radius:10px;">></button>
        </div>

        <footer>
            <div class="nav-link active" onclick="tab('chat', this)">CHAT</div>
            <div class="nav-link" onclick="tab('maps', this)">MAPS</div>
            <div class="nav-link">HUB</div>
            <div class="nav-link" onclick="location.reload()">LOGOUT</div>
        </footer>
    </div>

    <script>
        // Принудительное скрытие Splash через 2.5 сек
        setTimeout(() => {
            const s = document.getElementById('splash');
            s.style.opacity = '0';
            setTimeout(() => { s.style.display = 'none'; }, 500);
        }, 2500);

        let lang = 'RU';
        const dict = {
            'RU': { welcome: "ДОБРО ПОЖАЛОВАТЬ", btn: "ИНИЦИАЛИЗАЦИЯ", greet: "СИСТЕМА: ПОДКЛЮЧЕНО. ЖДУ ВВОДА.", p1: "ИМЯ", p2: "ФАМИЛИЯ", p3: "ТЕЛЕФОН" },
            'EN': { welcome: "WELCOME", btn: "INITIALIZE", greet: "SYSTEM: CONNECTED. READY.", p1: "FIRST NAME", p2: "LAST NAME", p3: "PHONE" }
        };

        function toggleL() {
            lang = lang === 'RU' ? 'EN' : 'RU';
            document.getElementById('cur-l').innerText = lang;
            const d = dict[lang];
            document.getElementById('t-welcome').innerText = d.welcome;
            document.getElementById('t-btn').innerText = d.btn;
            document.getElementById('t-greet').innerText = d.greet;
            document.getElementById('fn').placeholder = d.p1;
            document.getElementById('ln').placeholder = d.p2;
            document.getElementById('ph').placeholder = d.p3;
        }

        function openSys() {
            document.getElementById('scr-reg').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        }

        function tab(name, el) {
            document.getElementById('view-chat').style.display = (name === 'chat' ? 'flex' : 'none');
            document.getElementById('chat-tools').style.display = (name === 'chat' ? 'flex' : 'none');
            document.getElementById('view-maps').style.display = (name === 'maps' ? 'block' : 'none');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function send() {
            const i = document.getElementById('min');
            if(!i.value) return;
            const v = document.getElementById('view-chat');
            v.innerHTML += <div class="msg user">${i.value}</div>;
            const val = i.value;
            i.value = '';
            setTimeout(() => {
                const r = lang === 'RU' ? "АНАЛИЗ: " : "ANALYSIS: ";
                v.innerHTML += <div class="msg ai">${r} "${val.toUpperCase()}" [OK]</div>;
                document.getElementById('main-content').scrollTop = v.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
